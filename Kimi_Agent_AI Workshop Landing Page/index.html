<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F7WMPCPC92"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-F7WMPCPC92');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workshop 0 — Change Your Mind | AIFLOWTIME</title>
    <meta name="description" content="2.5小時AI體驗工作坊，零基礎也能學會。學會問對問題，讓AI幫你做對事。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-card-hover: #161622;
            --border: rgba(255,255,255,0.07);
            --border-glow: rgba(217,119,87,0.35);
            --accent: #D97757;
            --accent-dim: rgba(217,119,87,0.15);
            --accent-glow: rgba(217,119,87,0.4);
            --text: #f0ede8;
            --text-dim: rgba(240,237,232,0.55);
            --text-muted: rgba(240,237,232,0.3);
            --white: #ffffff;
            --radius: 16px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
            overflow-x: hidden;
        }
        body.layout-loading .page-content {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .page-content {
            transition: opacity .35s ease;
        }

        /* =============================================
           BACKGROUND "0" ANIMATION CANVAS
        ============================================= */
        #bg-zero-wrap {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }
        #bg-zero-canvas {
            display: block;
            width: 100%; height: 100%;
            opacity: 0.3;
        }

        .page-content { position: relative; z-index: 1; }

        /* =============================================
           HEADER / NAV
        ============================================= */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10,10,15,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 72rem;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        .logo {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.5px;
            transition: color 0.3s;
        }
        .logo:hover { color: var(--accent); }
        .logo span { color: var(--accent); }

        .nav-desktop { display: none; }
        .nav-desktop a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 32px;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .nav-desktop a:hover { color: var(--accent); }

        .nav-desktop .nav-cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            padding: 0 22px;
            margin-left: 32px;
            background: var(--accent);
            color: #fff !important;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .nav-desktop .nav-cta-btn:hover { opacity: 0.85; }

        .nav-mobile { display: flex; align-items: center; }

        .hamburger {
            width: 44px; height: 44px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 6px;
            background: none; border: none; cursor: pointer;
            padding: 10px; border-radius: 8px;
            transition: background 0.3s;
        }
        .hamburger:hover { background: var(--accent-dim); }
        .hamburger .bar {
            display: block; width: 24px; height: 2px;
            background: var(--text); transition: all 0.3s ease; border-radius: 2px;
        }
        .hamburger.active .bar:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active .bar:nth-child(2) { opacity: 0; }
        .hamburger.active .bar:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        .mobile-menu {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: rgba(10,10,15,0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 24px;
            transform: translateY(-100%);
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
        }
        .mobile-menu.active { transform: translateY(0); opacity: 1; visibility: visible; }
        .mobile-menu a {
            display: flex; align-items: center;
            color: var(--text); text-decoration: none;
            padding: 16px 0; font-size: 18px; font-weight: 700;
            border-bottom: 1px solid var(--border); min-height: 44px;
        }
        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover { color: var(--accent); }
        .mobile-menu .mob-cta {
            margin-top: 16px; width: 100%; justify-content: center;
            background: var(--accent); color: #fff !important;
            border-radius: 10px; font-weight: 700; padding: 14px 0; border-bottom: none;
        }

        @media (min-width: 769px) {
            .nav-desktop { display: flex; align-items: center; }
            .nav-mobile { display: none; }
        }

        /* =============================================
           GENERAL
        ============================================= */
        section { padding: 25px 24px; }
        .container { max-width: 1100px; margin: 0 auto; }

        .section-label {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .section-desc {
            font-size: 17px;
            color: var(--text-dim);
            max-width: 600px;
            font-weight: 300;
        }

        /* =============================================
           BUTTONS
        ============================================= */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--accent-glow); }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: transparent;
            color: var(--text-dim);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* =============================================
           SCROLL REVEAL
        ============================================= */
        .reveal {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }
        .reveal-delay-5 { transition-delay: 0.5s; }

        @media (max-width: 768px), (pointer: coarse) {
            .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
        }

        /* =============================================
           HERO
        ============================================= */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 24px 80px;
            position: relative;
        }

        .hero-media-wrap {
            text-align: center;
            margin-bottom: 24px;
            max-width: 480px;
            width: 100%;
        }
        .hero-media-wrap.hero-media-pending { opacity: 0; }
        .hero-media-wrap.hero-media-ready  { opacity: 1; transition: opacity .4s ease; }
        .hero-media-wrap img.hero-media,
        .hero-media-wrap video.hero-media {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-glow);
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 12px;
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.12em;
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 32px;
        }

        .hero-title {
            font-size: clamp(36px, 7vw, 72px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .hero-title b,
        .hero-title strong {
            font-weight: 900;
        }
        .hero-title .accent { color: var(--accent); }

        .hero-tagline {
            font-size: clamp(16px, 2.5vw, 22px);
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto 48px;
            font-weight: 300;
        }
        .hero-tagline strong { color: var(--text); font-weight: 500; }

        .cta-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        .scroll-hint {
            margin-top: auto;
            padding-top: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }
        .scroll-hint-pill {
            width: 24px; height: 40px;
            border: 2px solid var(--text-muted);
            border-radius: 12px;
            display: flex; justify-content: center; padding-top: 8px;
        }
        .scroll-hint-dot {
            width: 4px; height: 8px;
            background: var(--accent);
            border-radius: 2px;
            animation: scrollBounce 1.5s ease-in-out infinite;
        }
        @keyframes scrollBounce { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(10px); opacity: 0.3; } }
        .scroll-hint span { font-size: 12px; font-family: 'Courier Prime', monospace; letter-spacing: 0.1em; }

        /* =============================================
           CARDS
        ============================================= */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            transition: border-color 0.3s, transform 0.3s;
        }
        .card:hover { border-color: var(--border-glow); transform: translateY(-4px); }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .card-number {
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: var(--accent-dim);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .card h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .card p { color: var(--text-dim); font-size: 15px; line-height: 1.6; }

        .card-grid.lo-takeaway-grid {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .lo-accordion-card {
            padding: 24px 24px 16px;
            display: flex;
            flex-direction: column;
        }
        .lo-accordion-card:hover { transform: translateY(-2px); }
        .lo-accordion-card .card-number { margin-bottom: 6px; }
        .lo-accordion-card h3 { font-size: 16px; margin-bottom: 6px; line-height: 1.35; }
        .lo-accordion-card .lo-card-summary {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.55;
            margin: 0;
            flex: 1;
        }
        .lo-card-details {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .lo-card-details .lo-detail-text {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.65;
            margin: 0;
        }
        .lo-accordion-toggle {
            margin-top: 8px;
            align-self: center;
            width: 44px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--accent);
            padding: 0;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .lo-accordion-toggle:hover { background: var(--accent-dim); }
        .lo-tools {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            margin-top: 32px;
        }
        .lo-tool-box {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px 8px 8px;
            border-radius: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 14px; font-weight: 600; color: var(--text);
        }
        .lo-tool-box img {
            width: 28px; height: 28px; border-radius: 8px; object-fit: cover;
        }
        .lo-acc-tri {
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 11px solid currentColor;
            transition: transform 0.25s ease;
        }
        .lo-accordion-toggle.is-open .lo-acc-tri { transform: rotate(180deg); }

        /* Testimonial marquee */
        .sec-testimonial-marquee {
            --tm-duration: 55s;
            padding: 18px 0 14px;
            overflow: hidden;
        }
        .sec-testimonial-marquee .tm-intro {
            margin-top: 12px;
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.65;
            max-width: 42rem;
            margin-left: auto;
            margin-right: auto;
        }
        .sec-testimonial-marquee .tm-intro:empty { display: none !important; }
        .tm-viewport {
            overflow: hidden;
            width: 100%;
            margin-top: 8px;
            mask-image: linear-gradient(90deg, transparent 0%, black 6%, black 94%, transparent 100%);
            -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 6%, black 94%, transparent 100%);
        }
        .tm-viewport:hover .tm-track { animation-play-state: paused; }
        .tm-track {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: clamp(16px, 3vw, 28px);
            width: max-content;
            animation: tm-marquee var(--tm-duration, 55s) linear infinite;
        }
        @keyframes tm-marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        @media (prefers-reduced-motion: reduce) {
            .tm-track { animation: none; }
            .tm-viewport:hover .tm-track { animation-play-state: unset; }
        }
        .tm-slide {
            flex: 0 0 auto;
            width: clamp(200px, 72vw, 320px);
            max-width: 100%;
        }
        .tm-slide-caption {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            line-height: 1.45;
            margin: 0 0 10px;
            min-height: 2.6em;
        }
        .tm-slide-img-btn {
            display: block;
            width: 100%;
            padding: 0;
            margin: 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            cursor: zoom-in;
            overflow: hidden;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .tm-slide-img-btn:hover,
        .tm-slide-img-btn:focus-visible {
            border-color: var(--border-glow);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
            outline: none;
        }
        .tm-slide-img-btn img {
            display: block;
            width: 100%;
            height: auto;
            vertical-align: middle;
            object-fit: contain;
            max-height: min(60vh, 420px);
            background: var(--bg-card);
        }

        .tm-lightbox {
            position: fixed;
            inset: 0;
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .tm-lightbox[hidden] { display: none !important; }
        .tm-lightbox-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(6, 6, 10, 0.92);
            border: none;
            cursor: zoom-out;
        }
        .tm-lightbox-dialog {
            position: relative;
            z-index: 1;
            max-width: min(96vw, 1200px);
            max-height: 92vh;
            margin: 0;
        }
        .tm-lightbox-img {
            display: block;
            max-width: 100%;
            max-height: 88vh;
            width: auto;
            height: auto;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.55);
        }
        .tm-lightbox-close {
            position: absolute;
            top: -44px;
            right: 0;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .tm-lightbox-close:hover { color: var(--accent); }

        /* =============================================
           TRANSFORMATION CARDS
        ============================================= */
        #transformation .card-grid {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            padding: 4px 2px 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-glow) transparent;
        }
        #transformation .card-grid::-webkit-scrollbar { height: 8px; }
        #transformation .card-grid::-webkit-scrollbar-track { background: transparent; }
        #transformation .card-grid::-webkit-scrollbar-thumb {
            background: var(--border-glow);
            border-radius: 999px;
        }
        .tf-card {
            padding: 0;
            overflow: hidden;
            flex: 0 0 min(360px, calc(100vw - 64px));
            scroll-snap-align: start;
        }
        @media (min-width: 1100px) {
            .tf-card {
                flex-basis: 340px;
            }
        }
        .tf-card-title {
            text-align: center;
            padding: 20px 24px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }
        .tf-card-body { padding: 20px 28px 28px; }
        .tf-before, .tf-after { padding: 12px 0; }
        .tf-label {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .tf-before .tf-label { color: var(--text-muted); }
        .tf-after .tf-label { color: var(--accent); }
        .tf-divider { height: 1px; background: var(--border-glow); margin: 4px 0; }
        .tf-before p, .tf-after p { font-size: 16px; line-height: 1.7; }

        /* =============================================
           AUDIENCE
        ============================================= */
        .audience-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .audience-item.yes { background: var(--bg-card); border: 1px solid var(--border-glow); }
        .audience-item.no { background: rgba(255,255,255,0.02); border: 1px solid var(--border); }
        .audience-icon { flex-shrink: 0; margin-top: 2px; }
        .audience-item.yes .audience-icon { color: var(--accent); }
        .audience-item.no .audience-icon { color: var(--text-muted); }
        .audience-item p { font-size: 16px; }
        .audience-item.no p { color: var(--text-dim); }

        .audience-divider {
            margin: 40px 0;
            border: none;
            border-top: 1px solid var(--border);
        }

        .audience-sub-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .audience-for-lead {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 18px;
        }

        /* =============================================
           LOGISTICS
        ============================================= */
        .logistics-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            max-width: 640px;
            margin: 0 auto;
        }
        .logistics-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
        }
        .logistics-row:last-child { border-bottom: none; }
        .logistics-icon {
            flex-shrink: 0;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            background: var(--accent-dim);
            color: var(--accent);
        }
        .logistics-label {
            flex-shrink: 0;
            width: 60px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.05em;
        }
        .logistics-value {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            text-align: right;
            line-height: 1.5;
        }
        .logistics-value .session-line {
            display: block;
            font-size: 0.95rem;
        }
        .logistics-value .session-label {
            font-size: 0.78rem;
            color: var(--text-dim);

                    (w0Btn ? '<div style="margin-top:24px;"><a href="' + w0BtnLink + '" class="btn-primary">' + _escHtml(w0Btn) + '</a></div>' : '') +
                    '</div></div>';
                break;
        }
    }

    document.addEventListener('click', function(e) {
        var btn = e.target.closest('#experience .lo-accordion-toggle');
        if (!btn || btn.style.display === 'none') return;
        var card = btn.closest('.lo-accordion-card');
        if (!card) return;
        var det = card.querySelector('.lo-card-details');
        if (!det) return;
        var open = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', open ? 'false' : 'true');
        btn.classList.toggle('is-open', !open);
        det.hidden = open;
    });

    (function initW0TestimonialLightbox() {
        var lb = document.getElementById('w0-tm-lightbox');
        if (!lb) return;
        var img = lb.querySelector('.tm-lightbox-img');
        var mainEl = document.getElementById('main-content');
        function closeLb() {
            lb.hidden = true;
            if (img) {
                img.removeAttribute('src');
                img.alt = '';
            }
            document.body.style.overflow = '';
        }
        document.addEventListener('click', function(e) {
            var b = e.target.closest('.tm-slide-img-btn');
            if (!b || !mainEl || !mainEl.contains(b)) return;
            var sm = b.querySelector('img');
            if (!sm || !sm.getAttribute('src')) return;
            if (img) {
                img.src = sm.currentSrc || sm.src;
                img.alt = sm.alt || '';
            }
            lb.hidden = false;
            document.body.style.overflow = 'hidden';
        });
        var closeBtn = lb.querySelector('.tm-lightbox-close');
        var backdrop = lb.querySelector('.tm-lightbox-backdrop');
        if (closeBtn) closeBtn.addEventListener('click', closeLb);
        if (backdrop) backdrop.addEventListener('click', closeLb);
        document.addEventListener('keydown', function(ev) {
            if (ev.key === 'Escape' && !lb.hidden) closeLb();
        });
    })();

    var _w0LogisticsUnsub = null;
    window._w0LogisticsWsId = null;

    function _w0LoadLogisticsFromWorkshop(wsId) {
        if (_w0LogisticsUnsub) { _w0LogisticsUnsub(); _w0LogisticsUnsub = null; }
        if (!wsId) return;
        initFirebase(function() {
            var db = firebase.firestore();
            _w0LogisticsUnsub = db.collection('workshops').doc(wsId).onSnapshot(function(doc) {
                if (!doc.exists) return;
                _w0ApplyLogisticsData(doc.data(), wsId);
            });
        });
    }

    function _w0ApplyLogisticsData(d, wsId) {
        document.getElementById('lDuration').textContent = d.duration || '待定';
        var sessionsContainer = document.getElementById('lSessionsContainer');
        var globalCap = d.capacity || 0;

        function renderSessionBlocks(sessions) {
            var html = '';
            for (var i = 0; i < sessions.length; i++) {
                var s = sessions[i];
                var lbl = s.label || '';
                var dt = (s.date || '待定') + (s.time ? '  ' + s.time : '');
                var cap = s.capacity !== undefined ? s.capacity : globalCap;
                var enrolled = s.enrolled || 0;
                html += '<div class="logistics-session-block">';
                html += '<div class="logistics-session-header">';
                html += '<div class="logistics-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>';
                if (lbl) html += '<div class="logistics-session-label">' + lbl + '</div>';
                html += '<div class="logistics-session-datetime">' + dt + '</div>';
                html += '</div>';
                if (cap > 0) {
                    html += '<div class="logistics-session-cap">' + buildCapacityBar(cap, enrolled, {
                        barClass: 'ws0-cap-bar', rectClass: 'ws0-cap-rect',
                        textClass: 'ws0-cap-text', format: 'enrolled', spanWrap: true
                    }) + '</div>';
                }
                html += '</div>';
            }
            sessionsContainer.innerHTML = html;
        }

        if (d.sessions && d.sessions.length) {
            var sorted = sortSessionsList(d.sessions.filter(function(s) { return s.visible !== false; }));
            renderSessionBlocks(sorted);
        } else {
            var dt = (d.date || '即將公佈') + (d.time ? '  ' + d.time : '');
            sessionsContainer.innerHTML = '<div class="logistics-session-block"><div class="logistics-session-header">' +
                '<div class="logistics-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>' +
                '<div class="logistics-session-datetime">' + dt + '</div></div>' +
                (globalCap > 0 ? '<div class="logistics-session-cap">' + buildCapacityBar(globalCap, d.enrolled || 0, { barClass: 'ws0-cap-bar', rectClass: 'ws0-cap-rect', textClass: 'ws0-cap-text', format: 'enrolled', spanWrap: true }) + '</div>' : '') +
                '</div>';
        }

        var priceEl = document.getElementById('lPrice');
        if (d.price) priceEl.textContent = d.price;
        else if (d.priceHkd) priceEl.textContent = 'HKD ' + d.priceHkd;
        else priceEl.textContent = '待定';

        var modeEl = document.getElementById('lMode');
        if (modeEl) {
            var m = d.mode === 'online' ? '線上' : d.mode === 'both' ? '實體 + 線上' : '實體';
            var displayLoc = d.district || d.location || '';
            if (displayLoc && d.mode !== 'online') m += ' · ' + displayLoc;
            modeEl.textContent = m;
        }

        var ctaEl = document.getElementById('w0-cta-link');
        if (ctaEl) {
            var rawCta = (d.ctaLink || '').trim();
            var isSelf = !rawCta || rawCta === '#' || rawCta.indexOf(wsId) !== -1;
            ctaEl.href = isSelf ? '/workshop-payment?id=' + wsId : rawCta;
        }
    }

    applyLayoutConfig();
    </script>

    <script>
    initFirebase(function() {
        var wsId = window._w0LogisticsWsId || 'workshop-0';
        if (!window._w0LogisticsUnsub) {
            _w0LoadLogisticsFromWorkshop(wsId);
        }
    });
    </script>

    <!-- Background "0" Glassmorphism Animation -->
    <script>
    (function() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        const CONFIG = {
            tileSize: 12,
            gap: 2,
            layerDepth: 20,
            charScale: 0.8,
            colors: {
                front: { r: 224, g: 122, b: 95 },
                back:  { r: 120, g: 120, b: 130 }
            },
            animation: {
                jitterRange: 1.5,
                jitterSpeed: 0.002,
                pulseSpeed: 0.003
            },
            rotation: { x: -35, y: 23, z: 0 },
            models: ['0']
        };

        const canvas = document.getElementById('bg-zero-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        let tiles = [];
        let time = 0;

        class Tile {
            constructor(localX, localY, z, cx, cy, w, h, isBackLayer) {
                this.localX = localX;
                this.localY = localY;
                this.originZ = z;
                this.cx = cx;
                this.cy = cy;
                this.w = w;
                this.h = h;
                this.isBackLayer = isBackLayer;
                this.baseAlpha = 0.15 + Math.random() * 0.35;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.jitterPhaseX = Math.random() * Math.PI * 2;
                this.jitterPhaseY = Math.random() * Math.PI * 2;
                this.screenX = 0;
                this.screenY = 0;
                this.depth = 0;
                this.currentAlpha = 1;
            }

            update(timestamp) {
                const jx = Math.sin(time * CONFIG.animation.jitterSpeed + this.jitterPhaseX) * CONFIG.animation.jitterRange;
                const jy = Math.cos(time * CONFIG.animation.jitterSpeed + this.jitterPhaseY) * CONFIG.animation.jitterRange;
                let x = this.localX + jx;
                let y = this.localY + jy;
                let z = this.originZ;
                const radX = CONFIG.rotation.x * (Math.PI / 180);
                const radY = CONFIG.rotation.y * (Math.PI / 180);
                const radZ = CONFIG.rotation.z * (Math.PI / 180);
                let y1 = y * Math.cos(radX) - z * Math.sin(radX);
                let z1 = y * Math.sin(radX) + z * Math.cos(radX);
                let x2 = x * Math.cos(radY) + z1 * Math.sin(radY);
                let z2 = -x * Math.sin(radY) + z1 * Math.cos(radY);
                let x3 = x2 * Math.cos(radZ) - y1 * Math.sin(radZ);
                let y3 = x2 * Math.sin(radZ) + y1 * Math.cos(radZ);
                this.screenX = x3 + this.cx;
                this.screenY = y3 + this.cy;
                this.depth = z2;
                const pulse = Math.sin(time * CONFIG.animation.pulseSpeed + this.pulseOffset);
                this.currentAlpha = Math.max(0, Math.min(1, this.baseAlpha + (pulse * 0.1)));
            }

            draw(ctx) {
                const c = this.isBackLayer ? CONFIG.colors.back : CONFIG.colors.front;
                let alpha = this.currentAlpha;
                if (this.isBackLayer) alpha *= 0.6;
                ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
                ctx.beginPath();
                ctx.rect(this.screenX, this.screenY, this.w, this.h);
                ctx.fill();
                const borderAlpha = this.isBackLayer ? 0.1 : 0.3;
                ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${borderAlpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function generateScene() {
            tiles = [];
            const dpr = window.devicePixelRatio || 1;
            const screenW = canvas.width / dpr;
            const screenH = canvas.height / dpr;
            const isDesktop = screenW >= 768;
            const charBaseW = isDesktop ? 600 : Math.min(screenW * 0.85, 420);
            const charBaseH = isDesktop ? 900 : Math.min(screenH * 0.65, 630);
            const cx = screenW / 2;
            const cy = screenH / 2;
            createTilesForCharacter('0', cx, cy, charBaseW, charBaseH);
        }

        function createTilesForCharacter(char, cx, cy, w, h) {
            const buffer = document.createElement('canvas');
            buffer.width = w;
            buffer.height = h;
            const bctx = buffer.getContext('2d');
            bctx.fillStyle = '#000';
            bctx.font = `900 ${h * 0.8}px Arial, Helvetica, sans-serif`;
            bctx.textAlign = 'center';
            bctx.textBaseline = 'middle';
            bctx.fillText(char, w / 2, h / 2);
            const idata = bctx.getImageData(0, 0, w, h);
            const data = idata.data;
            const step = CONFIG.tileSize;
            for (let y = 0; y < h; y += step) {
                for (let x = 0; x < w; x += step) {
                    const index = (y * w + x) * 4 + 3;
                    if (data[index] > 50) {
                        const localX = x - w / 2;
                        const localY = y - h / 2;
                        const tileW = CONFIG.tileSize - CONFIG.gap;
                        const tileH = CONFIG.tileSize - CONFIG.gap;
                        const jX = (Math.random() - 0.5) * 4;
                        const jY = (Math.random() - 0.5) * 4;
                        tiles.push(new Tile(localX + jX, localY + jY, CONFIG.layerDepth / 2, cx, cy, tileW, tileH, false));
                        tiles.push(new Tile(localX + jX, localY + jY, -CONFIG.layerDepth / 2, cx, cy, tileW, tileH, true));
                    }
                }
            }
        }

        var lastInitWidth = 0;

        function init(force) {
            const wrap = document.getElementById('bg-zero-wrap');
            const screenW = wrap ? wrap.clientWidth : window.innerWidth;
            const screenH = wrap ? wrap.clientHeight : window.innerHeight;
            if (!force && Math.abs(screenW - lastInitWidth) < 5) return;
            lastInitWidth = screenW;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = screenW * dpr;
            canvas.height = screenH * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            generateScene();
        }

        function loop(timestamp) {
            time = timestamp;
            const dpr = window.devicePixelRatio || 1;
            const screenW = canvas.width / dpr;
            const screenH = canvas.height / dpr;
            ctx.clearRect(0, 0, screenW + 1, screenH + 1);
            tiles.forEach(tile => tile.update(timestamp));
            tiles.sort((a, b) => a.depth - b.depth);
            tiles.forEach(tile => tile.draw(ctx));
            requestAnimationFrame(loop);
        }

        init(true);
        requestAnimationFrame(loop);

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => init(false), 250);
        });
    })();

    // Lock pinch/double-tap zoom on mobile browsers
    (function lockPageZoom() {
        var lastTouchEnd = 0;
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', function(e) {
            if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('touchend', function(e) {
            var now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });
    })();
    </script>
