<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="animation.css">
</head>
<body class="bg-[#0f0f14]">

<!-- Audience Section -->
<section id="audience" class="py-20 md:py-28 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
        
        <!-- Section Header -->
        <div class="text-center mb-16 scroll-reveal">
            <h2 class="text-3xl md:text-4xl font-bold text-[#f5f5f0] tracking-tight">
                這堂課適合誰？
            </h2>
            <div class="w-16 h-1 bg-[#D97757] mx-auto mt-4 rounded-full"></div>
        </div>

        <!-- Target Audience List -->
        <div class="space-y-4 mb-20">
            <!-- Item 1 -->
            <div class="scroll-reveal stagger-1 group">
                <div class="flex items-start gap-4 p-5 rounded-xl bg-[#1a1a24] border border-[#2a2a3a] hover:border-[#D97757]/40 transition-all duration-300 hover:bg-[#1e1e2a]">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#D97757]/15 flex items-center justify-center mt-0.5">
                        <svg class="w-4 h-4 text-[#D97757]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <p class="text-[#d4d4c8] text-base md:text-lg leading-relaxed pt-0.5">
                        從未用過 AI，想試但不知從何開始
                    </p>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="scroll-reveal stagger-2 group">
                <div class="flex items-start gap-4 p-5 rounded-xl bg-[#1a1a24] border border-[#2a2a3a] hover:border-[#D97757]/40 transition-all duration-300 hover:bg-[#1e1e2a]">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#D97757]/15 flex items-center justify-center mt-0.5">
                        <svg class="w-4 h-4 text-[#D97757]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <p class="text-[#d4d4c8] text-base md:text-lg leading-relaxed pt-0.5">
                        用過一兩次，覺得 AI 回答很普通
                    </p>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="scroll-reveal stagger-3 group">
                <div class="flex items-start gap-4 p-5 rounded-xl bg-[#1a1a24] border border-[#2a2a3a] hover:border-[#D97757]/40 transition-all duration-300 hover:bg-[#1e1e2a]">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#D97757]/15 flex items-center justify-center mt-0.5">
                        <svg class="w-4 h-4 text-[#D97757]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <p class="text-[#d4d4c8] text-base md:text-lg leading-relaxed pt-0.5">
                        想知道為什麼別人用 AI 這麼厲害，自己卻做不到
                    </p>
                </div>
            </div>
        </div>

        <!-- NOT For Section -->
        <div class="scroll-reveal">
            <div class="border-t border-[#2a2a3a] pt-14">
                <h3 class="text-xl md:text-2xl font-semibold text-[#888888] text-center mb-10">
                    這堂課不適合誰？
                </h3>

                <div class="space-y-4">
                    <!-- NOT For Item 1 -->
                    <div class="scroll-reveal stagger-1">
                        <div class="flex items-start gap-4 p-5 rounded-xl bg-[#15151c] border border-[#252530]">
                            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#555555]/20 flex items-center justify-center mt-0.5">
                                <svg class="w-4 h-4 text-[#777777]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </div>
                            <p class="text-[#777777] text-base md:text-lg leading-relaxed pt-0.5">
                                已經每天用 ChatGPT 工作的人（<span class="text-[#999999]">進階工作坊更適合你</span>）
                            </p>
                        </div>
                    </div>

                    <!-- NOT For Item 2 -->
                    <div class="scroll-reveal stagger-2">
                        <div class="flex items-start gap-4 p-5 rounded-xl bg-[#15151c] border border-[#252530]">
                            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#555555]/20 flex items-center justify-center mt-0.5">
                                <svg class="w-4 h-4 text-[#777777]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </div>
                            <p class="text-[#777777] text-base md:text-lg leading-relaxed pt-0.5">
                                想學寫程式或開發 AI 產品的人
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<script src="animation.js"></script>
</body>
</html>
