<!-- ============================================
     CTA SECTION STYLES
     ============================================ -->
<style>
/* --------------------------------------------
   CSS Variables - Design Tokens
   -------------------------------------------- */
:root {
    /* Colors */
    --cta-bg-primary: #0f172a;
    --cta-bg-secondary: #1e293b;
    --cta-text-primary: #f8fafc;
    --cta-text-secondary: #cbd5e1;
    --cta-accent: #f97316;
    --cta-accent-hover: #fb923c;
    --cta-accent-glow: rgba(249, 115, 22, 0.5);
    --cta-trust-icon: #94a3b8;
    
    /* Animation */
    --cta-transition-fast: 0.2s ease;
    --cta-transition-medium: 0.3s ease;
    --cta-transition-slow: 0.6s ease;
    
    /* Spacing */
    --cta-section-padding: 8rem 1.5rem;
    --cta-content-gap: 1.5rem;
}

/* --------------------------------------------
   Section Container
   -------------------------------------------- */
.cta-section {
    position: relative;
    padding: var(--cta-section-padding);
    background: linear-gradient(
        180deg,
        var(--cta-bg-primary) 0%,
        var(--cta-bg-secondary) 50%,
        var(--cta-bg-primary) 100%
    );
    overflow: hidden;
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cta-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    z-index: 2;
}

/* --------------------------------------------
   Content Styling
   -------------------------------------------- */
.cta-content {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--cta-content-gap);
}

.cta-title {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--cta-text-primary);
    line-height: 1.2;
    margin: 0;
    letter-spacing: -0.02em;
}

.cta-subtitle {
    font-size: clamp(1.125rem, 2.5vw, 1.5rem);
    color: var(--cta-text-secondary);
    margin: 0;
    font-weight: 400;
}

/* --------------------------------------------
   CTA Button
   -------------------------------------------- */
.cta-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem 3rem;
    margin-top: 1rem;
    background: linear-gradient(
        135deg,
        var(--cta-accent) 0%,
        #ea580c 100%
    );
    color: white;
    font-size: 1.25rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 9999px;
    border: none;
    cursor: pointer;
    overflow: hidden;
    transition: transform var(--cta-transition-medium),
                box-shadow var(--cta-transition-medium);
    box-shadow: 
        0 4px 14px rgba(249, 115, 22, 0.4),
        0 0 30px rgba(249, 115, 22, 0.2);
}

.cta-button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 
        0 8px 25px rgba(249, 115, 22, 0.5),
        0 0 50px rgba(249, 115, 22, 0.3);
}

.cta-button:active {
    transform: translateY(-1px) scale(0.98);
}

/* Button Glow Effect */
.cta-button-glow {
    position: absolute;
    inset: -2px;
    background: linear-gradient(
        45deg,
        var(--cta-accent),
        #fb923c,
        var(--cta-accent),
        #ea580c
    );
    background-size: 300% 300%;
    border-radius: 9999px;
    z-index: -1;
    opacity: 0;
    filter: blur(15px);
    animation: buttonGlow 3s ease infinite;
    transition: opacity var(--cta-transition-medium);
}

.cta-button:hover .cta-button-glow {
    opacity: 0.6;
}

@keyframes buttonGlow {
    0%, 100% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
}

/* Pulse Animation */
.cta-button::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    background: var(--cta-accent);
    z-index: -1;
    animation: buttonPulse 2s ease-in-out infinite;
}

@keyframes buttonPulse {
    0%, 100% {
        transform: scale(1);
        opacity: 0.5;
    }
    50% {
        transform: scale(1.05);
        opacity: 0;
    }
}

/* --------------------------------------------
   Trust Signals
   -------------------------------------------- */
.trust-signals {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 2rem;
    flex-wrap: wrap;
}

.trust-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--cta-trust-icon);
    font-size: 0.9375rem;
    font-weight: 500;
}

.trust-icon {
    width: 1.25rem;
    height: 1.25rem;
    flex-shrink: 0;
}

.trust-divider {
    width: 4px;
    height: 4px;
    background: var(--cta-trust-icon);
    border-radius: 50%;
    opacity: 0.5;
}

/* --------------------------------------------
   Decorative Elements
   -------------------------------------------- */
.cta-decoration {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
}

.orb-1 {
    width: 400px;
    height: 400px;
    background: var(--cta-accent);
    top: -100px;
    right: -100px;
    animation: orbFloat 8s ease-in-out infinite;
}

.orb-2 {
    width: 300px;
    height: 300px;
    background: #3b82f6;
    bottom: -50px;
    left: -50px;
    animation: orbFloat 10s ease-in-out infinite reverse;
}

@keyframes orbFloat {
    0%, 100% {
        transform: translate(0, 0) scale(1);
    }
    33% {
        transform: translate(30px, -30px) scale(1.1);
    }
    66% {
        transform: translate(-20px, 20px) scale(0.9);
    }
}

/* --------------------------------------------
   Scroll Animation Classes
   -------------------------------------------- */
.cta-title,
.cta-subtitle,
.cta-button,
.trust-signals {
    opacity: 0;
    transform: translateY(30px);
}

.cta-title.animate-in,
.cta-subtitle.animate-in,
.cta-button.animate-in,
.trust-signals.animate-in {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* Staggered Animation Delays */
.cta-title.animate-in {
    transition-delay: 0s;
}

.cta-subtitle.animate-in {
    transition-delay: 0.1s;
}

.cta-button.animate-in {
    transition-delay: 0.2s;
}

.trust-signals.animate-in {
    transition-delay: 0.3s;
}

/* --------------------------------------------
   Responsive Design
   -------------------------------------------- */
@media (max-width: 640px) {
    .cta-section {
        padding: 5rem 1rem;
        min-height: 50vh;
    }
    
    .cta-button {
        padding: 1rem 2.5rem;
        font-size: 1.125rem;
        width: 100%;
        max-width: 280px;
    }
    
    .trust-signals {
        flex-direction: column;
        gap: 0.75rem;
    }
    
    .trust-divider {
        display: none;
    }
    
    .glow-orb {
        filter: blur(60px);
        opacity: 0.1;
    }
    
    .orb-1 {
        width: 250px;
        height: 250px;
    }
    
    .orb-2 {
        width: 200px;
        height: 200px;
    }
}

@media (min-width: 641px) and (max-width: 1024px) {
    .cta-section {
        padding: 6rem 2rem;
    }
    
    .glow-orb {
        opacity: 0.12;
    }
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
    .cta-button::before,
    .cta-button-glow,
    .glow-orb {
        animation: none;
    }
    
    .cta-title,
    .cta-subtitle,
    .cta-button,
    .trust-signals {
        opacity: 1;
        transform: none;
    }
}
</style>

<!-- ============================================
     CTA SECTION JAVASCRIPT
     ============================================ -->
<script>
(function() {
    'use strict';
    
    // Initialize CTA Section Animations
    function initCTASection() {
        const ctaSection = document.getElementById('cta');
        if (!ctaSection) return;
        
        const animatedElements = ctaSection.querySelectorAll(
            '.cta-title, .cta-subtitle, .cta-button, .trust-signals'
        );
        
        // Check if IntersectionObserver is available
        if ('IntersectionObserver' in window) {
            const observerOptions = {
                root: null,
                rootMargin: '0px 0px -10% 0px',
                threshold: 0.2
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Add animation class with staggered delay
                        animatedElements.forEach((el, index) => {
                            setTimeout(() => {
                                el.classList.add('animate-in');
                            }, index * 100);
                        });
                        
                        // Stop observing after animation triggers
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            
            observer.observe(ctaSection);
        } else {
            // Fallback: Show all elements immediately
            animatedElements.forEach(el => {
                el.classList.add('animate-in');
            });
        }
    }
    
    // Button click tracking (optional)
    function initButtonTracking() {
        const ctaButton = document.querySelector('.cta-button');
        if (ctaButton) {
            ctaButton.addEventListener('click', function(e) {
                // Add ripple effect on click
                const ripple = document.createElement('span');
                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.4);
                    transform: scale(0);
                    animation: rippleEffect 0.6s ease-out;
                    pointer-events: none;
                `;
                
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        }
        
        // Add ripple animation keyframes if not exists
        if (!document.getElementById('ripple-keyframes')) {
            const style = document.createElement('style');
            style.id = 'ripple-keyframes';
            style.textContent = `
                @keyframes rippleEffect {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        }
    }
    
    // Initialize on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            initCTASection();
            initButtonTracking();
        });
    } else {
        initCTASection();
        initButtonTracking();
    }
    
    // Re-initialize on dynamic content load (if needed)
    window.initCTASection = initCTASection;
})();
</script>
