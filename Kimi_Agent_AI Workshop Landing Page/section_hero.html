<!--
  Workshop 0 — Hero Section
  "Change Your Mind" Landing Page
  
  Features:
  - Dark, modern, minimalist design (Linear.app / Stripe inspired)
  - GSAP entrance animations with stagger
  - Magnetic CTA button with glow effect
  - Responsive mobile-first design
  - Traditional Chinese content
-->

<section id="hero" class="hero-section">
  <!-- Background gradient overlay -->
  <div class="hero-bg-gradient"></div>
  
  <!-- Subtle animated background elements -->
  <div class="hero-bg-elements">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
  </div>

  <!-- Main content container -->
  <div class="hero-container">
    <div class="hero-content">
      <!-- Headline -->
      <h1 class="hero-headline">
        <span class="headline-line">你問對一個問題，</span>
        <span class="headline-line">AI 就能幫你做對一件事。</span>
      </h1>

      <!-- Subtitle -->
      <p class="hero-subtitle">
        <span class="subtitle-item">2.5 小時體驗工作坊</span>
        <span class="subtitle-separator">｜</span>
        <span class="subtitle-item">零基礎</span>
        <span class="subtitle-separator">｜</span>
        <span class="subtitle-item">即場見效</span>
      </p>

      <!-- CTA Button -->
      <div class="hero-cta-wrapper">
        <a href="#register" class="hero-cta-button" id="heroCta">
          <span class="cta-text">我要報名</span>
          <span class="cta-glow"></span>
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator">
    <div class="scroll-mouse">
      <div class="scroll-wheel"></div>
    </div>
    <span class="scroll-text">向下滾動</span>
  </div>
</section>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- GSAP for animations -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- Custom styles -->
<style>
  /* ========================================
     CSS Custom Properties
     ======================================== */
  :root {
    --color-bg-primary: #0a0a0f;
    --color-bg-secondary: #111118;
    --color-accent: #D97757;
    --color-accent-hover: #e09070;
    --color-text-primary: #f5f5f0;
    --color-text-secondary: rgba(245, 245, 240, 0.7);
    --color-text-muted: rgba(245, 245, 240, 0.5);
    --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ========================================
     Hero Section Base
     ======================================== */
  .hero-section {
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--color-bg-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  }

  /* ========================================
     Background Elements
     ======================================== */
  .hero-bg-gradient {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(224, 122, 95, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(224, 122, 95, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26, 26, 46, 0.5) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .hero-bg-elements {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: orbFloat 20s ease-in-out infinite;
  }

  .orb-1 {
    width: 600px;
    height: 600px;
    background: linear-gradient(135deg, rgba(224, 122, 95, 0.2), transparent);
    top: -200px;
    right: -100px;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 400px;
    height: 400px;
    background: linear-gradient(135deg, rgba(224, 122, 95, 0.15), transparent);
    bottom: -100px;
    left: -100px;
    animation-delay: -7s;
  }

  .orb-3 {
    width: 300px;
    height: 300px;
    background: linear-gradient(135deg, rgba(245, 245, 240, 0.05), transparent);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -14s;
  }

  @keyframes orbFloat {
    0%, 100% {
      transform: translate(0, 0) scale(1);
    }
    25% {
      transform: translate(30px, -30px) scale(1.05);
    }
    50% {
      transform: translate(-20px, 20px) scale(0.95);
    }
    75% {
      transform: translate(-30px, -20px) scale(1.02);
    }
  }

  /* ========================================
     Hero Container
     ======================================== */
  .hero-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  @media (min-width: 640px) {
    .hero-container {
      padding: 3rem 2rem;
    }
  }

  @media (min-width: 1024px) {
    .hero-container {
      padding: 4rem 3rem;
    }
  }

  /* ========================================
     Hero Content
     ======================================== */
  .hero-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 1.5rem;
  }

  @media (min-width: 640px) {
    .hero-content {
      gap: 2rem;
    }
  }

  /* ========================================
     Headline
     ======================================== */
  .hero-headline {
    font-size: clamp(1.75rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.3;
    color: var(--color-text-primary);
    letter-spacing: -0.02em;
    margin: 0;
  }

  .headline-line {
    display: block;
    opacity: 0;
    transform: translateY(30px);
  }

  .headline-line:first-child {
    margin-bottom: 0.25rem;
  }

  /* ========================================
     Subtitle
     ======================================== */
  .hero-subtitle {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    font-size: clamp(0.875rem, 2vw, 1.125rem);
    color: var(--color-text-secondary);
    font-weight: 400;
    letter-spacing: 0.02em;
    margin: 0;
    opacity: 0;
    transform: translateY(20px);
  }

  .subtitle-separator {
    color: var(--color-accent);
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .hero-subtitle {
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .subtitle-separator {
      display: none;
    }
    
    .subtitle-item:not(:last-child)::after {
      content: '';
      display: block;
      height: 1px;
      width: 30px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      margin: 0.25rem auto;
      opacity: 0.5;
    }
  }

  /* ========================================
     CTA Button
     ======================================== */
  .hero-cta-wrapper {
    margin-top: 1rem;
    opacity: 0;
    transform: translateY(20px);
  }

  @media (min-width: 640px) {
    .hero-cta-wrapper {
      margin-top: 1.5rem;
    }
  }

  .hero-cta-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 2.5rem;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 600;
    color: var(--color-text-primary);
    background: linear-gradient(135deg, var(--color-accent), var(--color-accent-hover));
    border-radius: 9999px;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: 
      transform 0.3s var(--transition-bounce),
      box-shadow 0.3s var(--transition-smooth);
    overflow: hidden;
    will-change: transform;
  }

  @media (min-width: 640px) {
    .hero-cta-button {
      padding: 1.125rem 3rem;
    }
  }

  /* Button hover glow effect */
  .hero-cta-button::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--color-accent), var(--color-accent-hover), var(--color-accent));
    border-radius: 9999px;
    z-index: -1;
    opacity: 0;
    filter: blur(15px);
    transition: opacity 0.3s var(--transition-smooth);
  }

  .hero-cta-button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 
      0 10px 40px -10px rgba(224, 122, 95, 0.5),
      0 0 60px -10px rgba(224, 122, 95, 0.3);
  }

  .hero-cta-button:hover::before {
    opacity: 0.6;
  }

  .hero-cta-button:active {
    transform: translateY(-1px) scale(0.98);
  }

  /* Button shine effect */
  .hero-cta-button::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.2),
      transparent
    );
    transition: left 0.5s var(--transition-smooth);
  }

  .hero-cta-button:hover::after {
    left: 100%;
  }

  .cta-text {
    position: relative;
    z-index: 1;
  }

  /* ========================================
     Scroll Indicator
     ======================================== */
  .scroll-indicator {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    opacity: 0;
    z-index: 10;
  }

  .scroll-mouse {
    width: 24px;
    height: 36px;
    border: 2px solid var(--color-text-muted);
    border-radius: 12px;
    display: flex;
    justify-content: center;
    padding-top: 6px;
  }

  .scroll-wheel {
    width: 4px;
    height: 8px;
    background: var(--color-accent);
    border-radius: 2px;
    animation: scrollWheel 1.5s ease-in-out infinite;
  }

  @keyframes scrollWheel {
    0% {
      transform: translateY(0);
      opacity: 1;
    }
    50% {
      transform: translateY(8px);
      opacity: 0.5;
    }
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .scroll-text {
    font-size: 0.75rem;
    color: var(--color-text-muted);
    letter-spacing: 0.1em;
  }

  /* ========================================
     Animation States (for JS reference)
     ======================================== */
  .hero-content.animated .headline-line,
  .hero-content.animated .hero-subtitle,
  .hero-content.animated .hero-cta-wrapper {
    opacity: 1;
    transform: translateY(0);
  }

  /* Reduced motion preference */
  @media (prefers-reduced-motion: reduce) {
    .bg-orb,
    .scroll-wheel {
      animation: none;
    }
    
    .headline-line,
    .hero-subtitle,
    .hero-cta-wrapper {
      opacity: 1;
      transform: none;
    }
    
    .scroll-indicator {
      opacity: 0.6;
    }
  }
</style>

<!-- Animation Scripts -->
<script>
  (function() {
    'use strict';

    // Wait for DOM and GSAP to be ready
    function initHeroAnimations() {
      // Check if GSAP is available
      if (typeof gsap === 'undefined') {
        console.warn('GSAP not loaded, using CSS fallback');
        enableCSSFallback();
        return;
      }

      // Register GSAP plugins if needed
      gsap.registerPlugin();

      // Create entrance animation timeline
      const heroTl = gsap.timeline({
        defaults: {
          ease: 'power3.out',
          duration: 0.8
        }
      });

      // Animate headline lines with stagger
      heroTl.to('.headline-line', {
        y: 0,
        opacity: 1,
        stagger: 0.15,
        duration: 0.8
      });

      // Animate subtitle
      heroTl.to('.hero-subtitle', {
        y: 0,
        opacity: 1,
        duration: 0.8
      }, '-=0.5');

      // Animate CTA button
      heroTl.to('.hero-cta-wrapper', {
        y: 0,
        opacity: 1,
        duration: 0.8
      }, '-=0.5');

      // Animate scroll indicator
      heroTl.to('.scroll-indicator', {
        opacity: 0.6,
        duration: 0.6
      }, '-=0.3');

      // Initialize magnetic button effect
      initMagneticButton();

      // Initialize parallax effect
      initParallax();
    }

    // CSS fallback for when GSAP is not available
    function enableCSSFallback() {
      document.querySelectorAll('.headline-line, .hero-subtitle, .hero-cta-wrapper').forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'none';
        el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      });
      document.querySelector('.scroll-indicator').style.opacity = '0.6';
    }

    // Magnetic button effect
    function initMagneticButton() {
      const button = document.getElementById('heroCta');
      if (!button) return;

      const magneticStrength = 0.3;
      const magneticRadius = 100;

      // Check if touch device
      const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
      if (isTouchDevice) return;

      button.addEventListener('mousemove', function(e) {
        const rect = button.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const deltaX = e.clientX - centerX;
        const deltaY = e.clientY - centerY;
        
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        
        if (distance < magneticRadius) {
          const strength = (1 - distance / magneticRadius) * magneticStrength;
          gsap.to(button, {
            x: deltaX * strength,
            y: deltaY * strength,
            duration: 0.3,
            ease: 'power2.out'
          });
        }
      });

      button.addEventListener('mouseleave', function() {
        gsap.to(button, {
          x: 0,
          y: 0,
          duration: 0.5,
          ease: 'elastic.out(1, 0.5)'
        });
      });
    }

    // Parallax scroll effect
    function initParallax() {
      const orbs = document.querySelectorAll('.bg-orb');
      if (!orbs.length) return;

      let ticking = false;

      window.addEventListener('scroll', function() {
        if (!ticking) {
          window.requestAnimationFrame(function() {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            
            // Only apply parallax when hero is visible
            if (scrollY < windowHeight) {
              orbs.forEach((orb, index) => {
                const speed = (index + 1) * 0.1;
                const yPos = scrollY * speed;
                orb.style.transform = `translateY(${yPos}px)`;
              });
            }
            
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    }

    // Initialize on DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initHeroAnimations);
    } else {
      initHeroAnimations();
    }

    // Also initialize when GSAP loads (if delayed)
    window.addEventListener('load', function() {
      if (typeof gsap !== 'undefined') {
        // Re-run if not already animated
        const headline = document.querySelector('.headline-line');
        if (headline && getComputedStyle(headline).opacity === '0') {
          initHeroAnimations();
        }
      }
    });
  })();
</script>
