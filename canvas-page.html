<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFLOWTIME Canvas Page</title>
    <meta name="description" content="">
    <style>
        html, body {
            margin: 0;
            min-height: 100%;
            background: #FAF9F7;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            overflow: hidden;
        }
        #canvasRoot {
            width: 100vw;
            height: 100vh;
        }
        .canvas-loading {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main id="canvasRoot">
        <div class="canvas-loading">Loading canvas...</div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-init.js"></script>
    <script src="/js/shared-utils.js?v=31"></script>
    <script src="/js/free-canvas-runtime.js"></script>
    <script>
        (function() {
            var root = document.getElementById('canvasRoot');
            var params = new URLSearchParams(window.location.search || '');
            var layoutDocId = window.__AIFLOWTIME_LAYOUT_DOC || params.get('layoutDoc') || 'canvas-demo';
            var isPreview = params.get('preview') === '1';
            var latestCanvasData = null;
            var CANVAS_VIEW_OPTS = { scaleMode: 'width' };

            if (window.AFFreeCanvas) window.AFFreeCanvas.ensureStyles();

            function renderCanvas(data) {
                latestCanvasData = data || latestCanvasData || {};
                if (window.applyFirestorePageMeta) {
                    window.applyFirestorePageMeta(latestCanvasData, {
                        fallbackTitle: latestCanvasData.pageName || document.title,
                        fallbackDescription: latestCanvasData.metaDescription || ''
                    });
                }
                if (!window.AFFreeCanvas) return;
                window.AFFreeCanvas.renderCanvas(root, latestCanvasData, CANVAS_VIEW_OPTS);
            }

            function loadFromFirestore(app) {
                var db = app.firestore();
                db.collection('pageLayouts').doc(layoutDocId).get().then(function(doc) {
                    if (!doc.exists) {
                        root.innerHTML = '<div class="canvas-loading">Canvas page not found.</div>';
                        return;
                    }
                    var data = doc.data() || {};
                    if (!isPreview && data.pageStatus && data.pageStatus !== 'published') {
                        root.innerHTML = '<div class="canvas-loading">This page is not published.</div>';
                        return;
                    }
                    renderCanvas(data);
                }).catch(function(err) {
                    root.innerHTML = '<div class="canvas-loading">Failed to load canvas: ' + (err && err.message ? err.message : 'Unknown error') + '</div>';
                });
            }

            window.addEventListener('message', function(event) {
                if (!event.data || event.data.type !== 'canvasPreview') return;
                renderCanvas({
                    pageMode: 'canvas',
                    canvas: event.data.canvas || {},
                    canvasNodes: Array.isArray(event.data.canvasNodes) ? event.data.canvasNodes : []
                });
            });

            window.addEventListener('resize', function() {
                if (window.AFFreeCanvas) window.AFFreeCanvas.resizeCanvas(root, CANVAS_VIEW_OPTS);
            });

            initFirebase(loadFromFirestore, { waitForAuthPersistence: false });
        })();
    </script>
</body>
</html>
