<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F7WMPCPC92"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-F7WMPCPC92');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簽到驗證 | AIFLOWTIME</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FAF9F7; --bg-off: #E8E4DF; --bg-pampas: #F4F3EE;
            --accent: #D97757; --accent-text: #C45A3A; --accent-dark: #C56A4B;
            --text: #3B3B3B; --text-light: #7A7A7A; --white: #FFFFFF;
            --green: #2E7D32; --green-bg: rgba(76,175,80,0.15);
            --red: #C62828; --red-bg: rgba(198,40,40,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Noto Sans TC',sans-serif; background:var(--bg-cream); color:var(--text); line-height:1.7; font-size:16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }

        .checkin-card {
            width:100%; max-width:420px; background:var(--white); border-radius:20px;
            padding:32px 28px; box-shadow:0 4px 24px rgba(0,0,0,0.06);
            border:1px solid rgba(255,255,255,0.4); text-align:center;
        }
        .checkin-logo { font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:24px; }
        .checkin-logo span { color:var(--accent); }

        .checkin-icon { width:64px; height:64px; border-radius:18px; display:inline-flex; align-items:center; justify-content:center; font-size:32px; margin-bottom:16px; }
        .checkin-icon.success { background:var(--green-bg); }
        .checkin-icon.error { background:var(--red-bg); }
        .checkin-icon.warn { background:rgba(232,152,63,0.15); }
        .checkin-icon.checked { background:var(--green-bg); }
        .checkin-icon.loading { background:var(--bg-pampas); }

        .checkin-title { font-size:22px; font-weight:700; margin-bottom:8px; }
        .checkin-title.success { color:var(--green); }
        .checkin-title.error { color:var(--red); }
        .checkin-title.warn { color:#E8983F; }
        .checkin-title.checked { color:var(--green); }

        .checkin-msg { font-size:14px; color:var(--text-light); font-weight:500; margin-bottom:20px; }

        .checkin-details { text-align:left; background:var(--bg-pampas); border-radius:14px; padding:16px 20px; margin-bottom:20px; }
        .checkin-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
        .checkin-row-label { color:var(--text-light); font-weight:600; }
        .checkin-row-value { color:var(--text); font-weight:500; text-align:right; }

        .checkin-btn {
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            height:48px; padding:0 32px; border-radius:12px; border:none;
            background:var(--green); color:var(--white); font-size:16px; font-weight:700;
            cursor:pointer; transition:all 0.3s; font-family:'Noto Sans TC',sans-serif; min-width:200px;
        }
        .checkin-btn:hover { background:#1B5E20; transform:translateY(-1px); }
        .checkin-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .checkin-btn.done { background:var(--text-light); }

        .checkin-back { display:inline-block; margin-top:16px; font-size:13px; color:var(--text-light); text-decoration:none; font-weight:600; }
        .checkin-back:hover { color:var(--accent); }

        .checkin-session-note { font-size:13px; color:var(--text-light); font-weight:600; margin:-4px 0 16px; }
        .checkin-session-list { display:flex; flex-direction:column; gap:10px; margin-bottom:8px; }
        .checkin-session-btn {
            width:100%; border:1px solid var(--bg-off); background:var(--white); color:var(--text);
            border-radius:12px; padding:14px 16px; text-align:left; cursor:pointer; transition:all 0.2s;
            font-family:'Noto Sans TC',sans-serif;
        }
        .checkin-session-btn:hover { border-color:var(--accent); transform:translateY(-1px); }
        .checkin-session-btn:disabled { cursor:not-allowed; opacity:1; transform:none; }
        .checkin-session-btn.checked { border-color:rgba(46,125,50,0.25); background:var(--green-bg); }
        .checkin-session-btn-title { display:block; font-size:14px; font-weight:700; color:var(--text); }
        .checkin-session-btn-sub { display:block; font-size:12px; color:var(--text-light); margin-top:4px; }

        .spinner { width:36px; height:36px; border:3px solid var(--bg-off); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="checkin-card" id="checkinCard">
    <div class="checkin-logo">AI<span>FLOW</span>TIME</div>
    <div class="checkin-icon loading">⏳</div>
    <div class="spinner"></div>
    <div class="checkin-title">正在驗證...</div>
    <div class="checkin-msg">正在查詢簽到資料，請稍候。</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script src="/js/shared-utils.js"></script>

<script>
var db, auth;
initFirebase(function() {
    db = firebase.firestore();
    auth = firebase.auth();
    init();
});

function getStatusText(s) {
    var map = { pending: '待確認', confirmed: '已確認', cancelled: '已取消', deleted: '已刪除' };
    return map[s] || s || '—';
}

function _sortSessions(sessions) {
    if (typeof sortSessionsList === 'function') return sortSessionsList(sessions);
    return (sessions || []).slice().sort(function(a, b) {
        var da = _normDateKey(a.date);
        var db2 = _normDateKey(b.date);
        if (da !== db2) return da < db2 ? -1 : 1;
        var ta = (a.time || '').replace(/[^0-9:]/g, '');
        var tb = (b.time || '').replace(/[^0-9:]/g, '');
        return ta < tb ? -1 : ta > tb ? 1 : 0;
    });
}

function _sessionStableId(session, fallbackIdx) {
    if (session && session.id && session.id.indexOf('session_') === 0 && !/^session_\d+$/.test(session.id)) return session.id;
    var d = (session && session.date || '').replace(/[年月]/g, '-').replace(/日.*/, '').replace(/\s/g, '');
    var t = (session && session.time || '').replace(/[^0-9:]/g, '');
    if (d || t) return 'session_' + d + (t ? '_' + t : '');
    return 'session_' + (fallbackIdx !== undefined ? fallbackIdx : 0);
}

function _formatSessionLabel(session, fallbackIdx, prefix) {
    var parts = [];
    if (session && session.label) parts.push(session.label);
    if (session && session.date) parts.push(session.date);
    if (session && session.time) parts.push(session.time);
    if (!parts.length) parts.push('第' + ((fallbackIdx || 0) + 1) + '堂');
    var label = parts.join(' ');
    if (session && session.mode === 'online') label += ' 線上';
    else if (session && session.mode === 'both') label += ' 實體＋線上';
    if (prefix) label = prefix + ' — ' + label;
    return label;
}

function _hasSessionAttendance(reg, sessionKey) {
    return !!(reg && reg.attendance && reg.attendance[sessionKey] && reg.attendance[sessionKey].attendedAt);
}

function _getSessionAttendanceTime(reg, sessionKey) {
    if (!reg || !reg.attendance || !reg.attendance[sessionKey]) return null;
    return reg.attendance[sessionKey].attendedAt || null;
}

function _resolveCheckinPlan(reg, ws) {
    var plan = {
        mode: 'plain',
        buttonLabel: '✓ 確認簽到',
        checkinMessage: '此參加者已確認付款，可以簽到。',
        checkedMessage: '',
        choices: []
    };
    if (!reg || !ws) {
        if (reg && reg.attendedAt) {
            var plainTime = reg.attendedAt.toDate ? reg.attendedAt.toDate() : new Date(reg.attendedAt);
            plan.alreadyChecked = true;
            plan.checkedMessage = '此參加者已於 ' + plainTime.toLocaleString('zh-Hant') + ' 完成簽到。';
        }
        return plan;
    }

    var isContinuous = ws.courseType === 'continuous' && ws.rounds && ws.rounds.length;
    if (isContinuous && reg.selectedRound) {
        var roundIdx = -1;
        var round = null;
        for (var ri = 0; ri < ws.rounds.length; ri++) {
            var candidate = ws.rounds[ri];
            if ((candidate.id && candidate.id === reg.selectedRound) || ((candidate.label || '') === (reg.selectedRoundLabel || ''))) {
                roundIdx = ri;
                round = candidate;
                break;
            }
        }
        if (round) {
            var roundLabel = round.label || reg.selectedRoundLabel || ('第' + (roundIdx + 1) + '期');
            var roundSessions = (round.sessions || []).filter(function(s) { return s.visible !== false; });
            plan.mode = 'choose';
            plan.checkinMessage = '請選擇這位學員今次出席的課堂。';
            plan.choiceNote = '這是多堂課程，簽到會記錄到指定課堂。';
            roundSessions.forEach(function(session, idx) {
                var key = 'round_' + roundIdx + '_session_' + idx;
                var attendedAt = _getSessionAttendanceTime(reg, key);
                var timeText = '';
                if (attendedAt) {
                    var d = attendedAt.toDate ? attendedAt.toDate() : new Date(attendedAt);
                    timeText = '已於 ' + d.toLocaleString('zh-Hant') + ' 簽到';
                } else {
                    timeText = '按此簽到這一堂';
                }
                plan.choices.push({
                    key: key,
                    label: _formatSessionLabel(session, idx, roundLabel),
                    checked: !!attendedAt,
                    subLabel: timeText
                });
            });
            plan.allChecked = !!plan.choices.length && plan.choices.every(function(choice) { return choice.checked; });
            if (plan.allChecked) {
                plan.alreadyChecked = true;
                plan.checkedMessage = '這位學員已完成此報讀期數的所有課堂簽到。';
            }
            return plan;
        }
    }

    var sessions = (ws.sessions || []).filter(function(s) { return s.visible !== false; });
    if (sessions.length > 1) {
        var sorted = _sortSessions(sessions);
        var matchedIdx = -1;
        var matchedSession = null;
        for (var i = 0; i < sorted.length; i++) {
            var sid = sorted[i].id || _sessionStableId(sorted[i], i);
            if (reg.selectedRound && sid === reg.selectedRound) {
                matchedIdx = i;
                matchedSession = sorted[i];
                break;
            }
        }
        if (!matchedSession && reg.selectedRoundLabel) {
            for (var j = 0; j < sorted.length; j++) {
                var label = _formatSessionLabel(sorted[j], j, '');
                if (label === reg.selectedRoundLabel) {
                    matchedIdx = j;
                    matchedSession = sorted[j];
                    break;
                }
            }
        }
        if (!matchedSession && reg.workshopDate) {
            for (var k = 0; k < sorted.length; k++) {
                var sameDate = (sorted[k].date || '') === (reg.workshopDate || '');
                var sameTime = !reg.workshopTime || (sorted[k].time || '') === (reg.workshopTime || '');
                if (sameDate && sameTime) {
                    matchedIdx = k;
                    matchedSession = sorted[k];
                    break;
                }
            }
        }
        if (matchedSession) {
            var sessionKey = 'session-' + matchedIdx;
            var attendedAt = _getSessionAttendanceTime(reg, sessionKey) || reg.attendedAt || null;
            plan.mode = 'session';
            plan.sessionKey = sessionKey;
            plan.buttonLabel = '✓ 確認簽到：' + _formatSessionLabel(matchedSession, matchedIdx, '');
            plan.checkinMessage = '此學員將會簽到已報名的指定場次。';
            if (attendedAt) {
                var sTime = attendedAt.toDate ? attendedAt.toDate() : new Date(attendedAt);
                plan.alreadyChecked = true;
                plan.checkedMessage = '此參加者已於 ' + sTime.toLocaleString('zh-Hant') + ' 完成該場次簽到。';
            }
            return plan;
        }
    }

    if (reg.attendedAt) {
        var attendTime = reg.attendedAt.toDate ? reg.attendedAt.toDate() : new Date(reg.attendedAt);
        plan.alreadyChecked = true;
        plan.checkedMessage = '此參加者已於 ' + attendTime.toLocaleString('zh-Hant') + ' 完成簽到。';
    }
    return plan;
}

function _buildSessionChoiceHtml(reg, plan) {
    if (!reg || !reg._id || !plan || !plan.choices || !plan.choices.length) return '';
    var html = '';
    if (plan.choiceNote) html += '<div class="checkin-session-note">' + escHtml(plan.choiceNote) + '</div>';
    html += '<div class="checkin-session-list">';
    plan.choices.forEach(function(choice) {
        var onclick = choice.checked ? '' : ' onclick="doCheckin(' + JSON.stringify(reg._id) + ', ' + JSON.stringify(choice.key) + ')"';
        html += '<button type="button" class="checkin-session-btn' + (choice.checked ? ' checked' : '') + '"' + (choice.checked ? ' disabled' : '') + onclick + '>';
        html += '<span class="checkin-session-btn-title">' + escHtml(choice.label) + '</span>';
        html += '<span class="checkin-session-btn-sub">' + escHtml(choice.subLabel || '') + '</span>';
        html += '</button>';
    });
    html += '</div>';
    return html;
}

function renderCard(type, title, msg, reg, showBtn, opts) {
    opts = opts || {};
    var card = document.getElementById('checkinCard');
    var iconMap = { success: '✅', error: '❌', warn: '⚠️', checked: '☑️', loading: '⏳' };

    var html = '<div class="checkin-logo">AI<span>FLOW</span>TIME</div>';
    html += '<div class="checkin-icon ' + type + '">' + iconMap[type] + '</div>';
    html += '<div class="checkin-title ' + type + '">' + escHtml(title) + '</div>';
    html += '<div class="checkin-msg">' + escHtml(msg) + '</div>';

    if (reg) {
        html += '<div class="checkin-details">';
        html += '<div class="checkin-row"><span class="checkin-row-label">姓名</span><span class="checkin-row-value">' + escHtml(reg.name || '—') + '</span></div>';
        html += '<div class="checkin-row"><span class="checkin-row-label">工作坊</span><span class="checkin-row-value">' + escHtml(reg.workshopTitle || reg.workshopId || '—') + '</span></div>';
        html += '<div class="checkin-row"><span class="checkin-row-label">電話</span><span class="checkin-row-value">' + escHtml(reg.phone || '—') + '</span></div>';
        html += '<div class="checkin-row"><span class="checkin-row-label">狀態</span><span class="checkin-row-value">' + escHtml(getStatusText(reg.status)) + '</span></div>';
        if (reg.pricePaid) {
            html += '<div class="checkin-row"><span class="checkin-row-label">已付款</span><span class="checkin-row-value">' + escHtml(reg.pricePaid) + '</span></div>';
        }
        html += '</div>';
    }

    if (opts.extraHtml) html += opts.extraHtml;

    if (opts.actionsHtml) {
        html += opts.actionsHtml;
    } else if (showBtn && reg && reg._id) {
        var onclick = 'doCheckin(' + JSON.stringify(reg._id) + (opts.sessionKey ? ', ' + JSON.stringify(opts.sessionKey) : '') + ')';
        html += '<button class="checkin-btn" id="checkinBtn" onclick="' + onclick + '">' + escHtml(opts.buttonLabel || '✓ 確認簽到') + '</button>';
    }

    html += '<a class="checkin-back" href="/workshop-cms">← 返回 CMS</a>';
    card.innerHTML = html;
}

var _token = null;
var _regData = null;
var _workshopData = null;
var ADMIN_EMAILS = ['jacobfung1392@gmail.com', 'jacobfung@aiflowtime.com'];

function init() {
    var params = new URLSearchParams(window.location.search);
    _token = params.get('token');

    if (!_token) {
        renderCard('error', '無效連結', '缺少簽到碼參數。請使用有效的 QR Code。', null, false);
        return;
    }

    // Wait for auth state
    auth.onAuthStateChanged(function(user) {
        if (!user || ADMIN_EMAILS.indexOf(user.email) === -1) {
            renderCard('warn', '需要管理員登入', '請先以管理員帳號登入，才能進行簽到驗證。', null, false);
            return;
        }
        lookupToken();
    });
}

function lookupToken() {
    // Look up registration
    db.collection('registrations').where('attendanceToken', '==', _token).limit(1).get().then(function(snap) {
        if (snap.empty) {
            renderCard('error', '無效簽到碼', '找不到對應的報名紀錄。此 QR Code 可能已失效或報名已被取消。', null, false);
            return;
        }

        var doc = snap.docs[0];
        var reg = doc.data();
        reg._id = doc.id;
        _regData = reg;

        if (reg.status !== 'confirmed') {
            renderCard('warn', '報名未確認', '此報名狀態為「' + getStatusText(reg.status) + '」，無法進行簽到。', reg, false);
            return;
        }

        if (!reg.workshopId) {
            renderResolvedCheckin(reg, null);
            return;
        }

        db.collection('workshops').doc(reg.workshopId).get().then(function(wsSnap) {
            _workshopData = wsSnap.exists ? wsSnap.data() : null;
            renderResolvedCheckin(reg, _workshopData);
        }).catch(function() {
            _workshopData = null;
            renderResolvedCheckin(reg, null);
        });
    }).catch(function(err) {
        renderCard('error', '查詢失敗', '無法查詢報名資料：' + err.message, null, false);
    });
}

function renderResolvedCheckin(reg, ws) {
    var plan = _resolveCheckinPlan(reg, ws);
    if (plan.mode === 'choose') {
        if (plan.alreadyChecked) {
            renderCard('checked', '已簽到', plan.checkedMessage, reg, false, { extraHtml: _buildSessionChoiceHtml(reg, plan) });
            return;
        }
        renderCard('success', '驗證成功', plan.checkinMessage, reg, false, { actionsHtml: _buildSessionChoiceHtml(reg, plan) });
        return;
    }
    if (plan.alreadyChecked) {
        renderCard('checked', '已簽到', plan.checkedMessage, reg, false);
        return;
    }
    renderCard('success', '驗證成功', plan.checkinMessage, reg, true, {
        buttonLabel: plan.buttonLabel,
        sessionKey: plan.sessionKey || ''
    });
}

function doCheckin(regId, sessionKey) {
    var btn = document.getElementById('checkinBtn');
    if (btn) { btn.disabled = true; btn.textContent = '正在簽到...'; }

    var updateData = {};
    var sessionLabel = '';
    if (sessionKey) {
        var plan = _resolveCheckinPlan(_regData, _workshopData);
        if (plan && plan.choices && plan.choices.length) {
            for (var i = 0; i < plan.choices.length; i++) {
                if (plan.choices[i].key === sessionKey) {
                    sessionLabel = plan.choices[i].label || '';
                    break;
                }
            }
        } else if (plan && plan.sessionKey === sessionKey) {
            sessionLabel = (plan.buttonLabel || '').replace(/^✓\s*確認簽到：/, '');
        }
        updateData['attendance.' + sessionKey + '.attendedAt'] = firebase.firestore.FieldValue.serverTimestamp();
        if (sessionLabel) updateData['attendance.' + sessionKey + '.label'] = sessionLabel;
    } else {
        updateData.attendedAt = firebase.firestore.FieldValue.serverTimestamp();
    }

    db.collection('registrations').doc(regId).update(updateData).then(function() {
        if (sessionKey) {
            if (!_regData.attendance) _regData.attendance = {};
            _regData.attendance[sessionKey] = {
                attendedAt: new Date(),
                label: sessionLabel || ((_regData.attendance[sessionKey] && _regData.attendance[sessionKey].label) || '')
            };
        } else {
            _regData.attendedAt = new Date();
        }
        renderResolvedCheckin(_regData, _workshopData);
    }).catch(function(err) {
        if (btn) { btn.disabled = false; btn.textContent = '✓ 確認簽到'; }
        alert('簽到失敗：' + err.message);
    });
}

</script>
</body>
</html>
