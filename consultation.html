<html lang="zh-Hant-HK">

    <meta name="description" content="90 分鐘一對一 AI 省時諮詢，幫你定位問題、拆解痛點，建立專屬 AI workflow。即走即用 prompts、AI 小技巧、模板清單，每日省 1-2 小時。">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-card-hover: #161622;
            --border: rgba(255,255,255,0.07);
            --border-glow: rgba(217,119,87,0.35);
            --accent: #D97757;
            --accent-dim: rgba(217,119,87,0.15);
            --accent-glow: rgba(217,119,87,0.4);
            --text: #f0ede8;
            --text-dim: rgba(240,237,232,0.55);
            --text-muted: rgba(240,237,232,0.3);
            --white: #ffffff;
            --radius: 16px;
            --green: #10B981;
            --green-dim: rgba(16,185,129,0.15);
            --purple: #8B5CF6;
            --purple-dim: rgba(139,92,246,0.15);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
            overflow-x: hidden;
        }
        body.layout-pending [data-section-id] {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        img { max-width: 100%; height: auto; display: block; }

        #noise-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: var(--bg);
        }
        #noise-bg .radial-glow {
            position: absolute; inset: 0;
            background: radial-gradient(circle 700px at 50% 0px, rgba(217,119,87,0.18), transparent 70%);
        }
        #noise-canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            pointer-events: none; image-rendering: pixelated;
        }

        .page-content { position: relative; z-index: 1; }

        /* ---- Header / Nav ---- */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(10,10,15,0.88);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 72rem; margin: 0 auto; padding: 1rem 1.5rem;
        }
        .logo {
            font-family: 'Noto Sans TC', sans-serif; font-size: 1.35rem; font-weight: 700;
            color: var(--text); text-decoration: none; letter-spacing: -0.5px; transition: color 0.3s;
        }
        .logo:hover { color: var(--accent); }
        .logo span { color: var(--accent); }

        .nav-desktop { display: none; }
        .nav-desktop a {
            color: var(--text-dim); text-decoration: none; margin-left: 32px;
            font-size: 15px; font-weight: 600; transition: color 0.3s;
        }
        .nav-desktop a:hover { color: var(--accent); }
        .nav-desktop .nav-cta-btn {
            display: inline-flex; align-items: center; justify-content: center;
            height: 40px; padding: 0 20px; margin-left: 24px;
            background: var(--accent); color: #fff !important;
            border-radius: 10px; font-size: 14px; font-weight: 700;
            text-decoration: none; transition: all 0.3s; border: none;
        }
        .nav-desktop .nav-cta-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--accent-glow); }

        .nav-mobile { display: flex; align-items: center; }
        .hamburger {
            width: 44px; height: 44px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 6px;
            background: none; border: none; cursor: pointer; padding: 10px;
            border-radius: 8px; transition: background 0.3s; position: relative;
        }
        .hamburger:hover { background: var(--accent-dim); }
        .hamburger .bar {
            display: block; width: 24px; height: 2px;
            background: var(--text); transition: all 0.3s ease; border-radius: 2px;
        }
        .hamburger.active .bar:nth-child(2) { opacity: 0; }
        .hamburger.active .bar:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active .bar:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        .mobile-menu {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(10,10,15,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 24px;
            transform: translateY(-100%); opacity: 0; visibility: hidden;
            transition: all 0.3s ease; z-index: 99;
        }
        .mobile-menu.active { transform: translateY(0); opacity: 1; visibility: visible; }
        .mobile-menu a {
            display: flex; align-items: center; color: var(--text); text-decoration: none;
            padding: 16px 0; font-size: 18px; font-weight: 700;
            border-bottom: 1px solid var(--border); min-height: 44px;
        }
        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover { color: var(--accent); }
        .mobile-menu .mob-cta {
            display: flex; align-items: center; justify-content: center;
            margin-top: 16px; width: 100%; height: 48px;
            background: var(--accent); color: #fff !important;
            border-radius: 12px; font-weight: 700; font-size: 16px;
        }

        @media (min-width: 768px) {
            .nav-desktop { display: flex; align-items: center; }
            .nav-mobile { display: none; }
            .mobile-menu { display: none; }
        }

        /* ---- Sections ---- */
        .section { max-width: 56rem; margin: 0 auto; padding: 0 20px; }
        .section-title {
            font-size: 2rem; font-weight: 700; text-align: center;
            margin-bottom: 12px; color: var(--text);
        }
        .section-sub {
            font-size: 1.1rem; color: var(--text-dim); text-align: center;
            margin-bottom: 48px; line-height: 1.8;
        }

        /* ---- Hero ---- */
        .hero {
            padding: 140px 20px 80px; text-align: center;
            max-width: 56rem; margin: 0 auto;
        }
        .hero-badge {
            display: inline-block; background: var(--accent-dim); color: var(--accent);
            font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 20px;
            letter-spacing: 1px; margin-bottom: 24px;
            font-family: 'Courier Prime', monospace;
        }
        .hero-pre {
            font-size: 1.1rem; color: var(--text-dim); margin-bottom: 12px;
        }
        .hero-pre .hl { color: var(--accent); font-weight: 600; }
        .hero h1 {
            font-size: 2.8rem; font-weight: 700; line-height: 1.25;
            margin-bottom: 24px; color: var(--text);
        }
        .hero h1 .accent { color: var(--accent); }
        .hero-img {
            display: block;
            width: 100%;
            max-width: 420px;
            max-height: 400px;
            height: auto;
            margin: 0 auto 32px;
            border-radius: var(--radius);
            object-fit: contain;
            object-position: center center;
        }
        .hero-desc {
            font-size: 1.15rem; color: var(--text-dim); max-width: 600px;
            margin: 0 auto 36px; line-height: 1.8;
        }

        @media (max-width: 480px) {
            .hero { padding: 110px 16px 60px; }
            .hero h1 { font-size: 2rem; }
        }

        @media (max-width: 640px) {
            .hero,
            .cta-section {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .hero > *:not(.hero-img) {
                width: 100%;
            }
            .cta-section > *:not(.cta-img):not(.glass-cta) {
                width: 100%;
            }
            .hero-img,
            .cta-img {
                flex-shrink: 0;
            }
        }

        /* ---- CTA Section ---- */
        .cta-section {
            padding: 80px 20px; text-align: center;
            max-width: 56rem; margin: 0 auto;
        }
        .cta-section h2 {
            font-size: 2rem; font-weight: 700; margin-bottom: 24px;
        }
        .cta-img {
            display: block;
            width: 100%;
            max-width: 600px;
            max-height: 250px;
            height: auto;
            margin: 0 auto 28px;
            border-radius: var(--radius);
            object-fit: contain;
            object-position: center center;
        }
        .cta-text {
            font-size: 1.1rem; color: var(--text-dim); margin-bottom: 12px;
            line-height: 1.8; font-weight: 500;
        }
        .cta-sub {
            font-size: 1.05rem; color: var(--text-muted); margin-bottom: 32px;
        }

        /* ---- Glass CTA Button ---- */
        .glass-cta {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            height: 60px; padding: 0 36px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 999px; font-size: 1.2rem; font-weight: 700;
            text-decoration: none; transition: all 0.3s;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            position: relative; overflow: hidden;
        }
        .glass-cta-text {
            background: linear-gradient(90deg, #FFD700 0%, #FFA500 25%, #FFD700 50%, #FFA500 75%, #FFD700 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shinyGold 3s ease-in-out infinite;
        }
        @keyframes shinyGold {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .glass-cta:hover {
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(217,119,87,0.2);
        }

        /* ---- Timeline ---- */
        .timeline-section {
            padding: 80px 20px; max-width: 48rem; margin: 0 auto;
        }
        .timeline-item {
            position: relative; padding-left: 44px; margin-bottom: 40px;
        }
        .timeline-item::before {
            content: ''; position: absolute; left: 0; top: 8px;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent); border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--accent-glow);
        }
        .timeline-item::after {
            content: ''; position: absolute; left: 7px; top: 28px;
            width: 2px; height: calc(100% - 12px);
            background: var(--border);
        }
        .timeline-item:last-child::after { display: none; }

        .timeline-item h3 {
            font-size: 1.15rem; font-weight: 700; margin-bottom: 10px;
            color: var(--text);
        }
        .timeline-item p { font-size: 0.95rem; color: var(--text-dim); line-height: 1.8; }

        .tl-highlight {
            padding: 14px 18px; border-radius: 12px; margin-top: 14px;
            font-size: 0.9rem; font-weight: 600;
        }
        .tl-highlight.orange { background: var(--accent-dim); color: var(--accent); }
        .tl-highlight.purple { background: var(--purple-dim); color: var(--purple); }

        /* ---- Deliverables Grid ---- */
        .del-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 14px; margin-top: 16px;
        }
        @media (max-width: 640px) { .del-grid { grid-template-columns: 1fr; } }

        .del-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; transition: all 0.3s;
        }
        .del-card:hover { border-color: var(--border-glow); transform: translateY(-2px); }
        .del-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
        .del-card p { font-size: 0.85rem; color: var(--text-dim); }

        /* ---- Result Card ---- */
        .result-card {
            background: var(--bg-card); border: 1px solid rgba(16,185,129,0.2);
            border-radius: var(--radius); padding: 32px 28px; margin-top: 16px;
        }
        .result-card h4 {
            font-size: 1.1rem; font-weight: 700; color: var(--green);
            margin-bottom: 12px;
        }
        .result-card p { font-size: 0.95rem; color: var(--text-dim); line-height: 1.8; margin-bottom: 12px; }
        .result-card .bold-line { color: var(--green); font-weight: 600; }

        .result-icons {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 16px; margin-top: 20px;
        }
        @media (max-width: 480px) { .result-icons { grid-template-columns: 1fr; } }
        .result-icon-item { text-align: center; }
        .result-icon-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--green); display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; box-shadow: 0 0 16px rgba(16,185,129,0.3);
        }
        .result-icon-circle svg { width: 22px; height: 22px; color: #fff; }
        .result-icon-item p { font-size: 0.85rem; font-weight: 600; color: var(--text); }

        /* ---- FAQ ---- */
        .faq-section {
            padding: 80px 20px; max-width: 48rem; margin: 0 auto;
        }
        .faq-item {
            border-bottom: 1px solid var(--border);
        }
        .faq-question {
            cursor: pointer; padding: 20px 0; display: flex;
            justify-content: space-between; align-items: center;
            font-weight: 600; font-size: 1rem; color: var(--text);
        }
        .faq-question:hover { color: var(--accent); }
        .faq-answer {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            color: var(--text-dim); font-size: 0.95rem; line-height: 1.8;
        }
        .faq-answer.open { max-height: 300px; padding-bottom: 20px; }
        .faq-icon { transition: transform 0.3s; color: var(--text-muted); flex-shrink: 0; }
        .faq-icon.open { transform: rotate(180deg); color: var(--accent); }

        /* ---- Footer ---- */
        footer {
            border-top: 1px solid var(--border);
            padding: 40px 24px; text-align: center;
        }
        footer p { font-size: 13px; color: var(--text-muted); }
        footer a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
        footer a:hover { color: var(--accent); }

        /* ---- Fade In ---- */
        .fade-in {
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-init.js"></script>

    <script src="/js/consultation-layout-runtime.js"></script>
    <script>
        // toggleMobileMenu and closeMobileMenu loaded from /js/shared-utils.js

        // FAQ toggle
        function toggleFAQ(el) {
            var answer = el.nextElementSibling;
            var icon = el.querySelector('.faq-icon');
            if (answer.classList.contains('open')) {
                answer.classList.remove('open');
                icon.classList.remove('open');
            } else {
                document.querySelectorAll('.faq-answer.open').forEach(function(a) { a.classList.remove('open'); });
                document.querySelectorAll('.faq-icon.open').forEach(function(i) { i.classList.remove('open'); });
                answer.classList.add('open');
                icon.classList.add('open');
            }
        }

        // Fade-in observer
        document.addEventListener('DOMContentLoaded', function() {
            var els = document.querySelectorAll('.fade-in');
            if ('IntersectionObserver' in window) {
                var obs = new IntersectionObserver(function(entries) {
                    entries.forEach(function(e) {
                        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
                    });
                }, { threshold: 0.1 });
                els.forEach(function(el) { obs.observe(el); });
            } else {
                els.forEach(function(el) { el.classList.add('visible'); });
            }
        });

        // Noise canvas
        (function() {
            var canvas = document.getElementById('noise-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d', { alpha: true });
            if (!ctx) return;
            var frame = 0, animId, REFRESH = 2, ALPHA = 18, SIZE = 1024;

            function resize() { canvas.width = SIZE; canvas.height = SIZE; }

            function drawNoise() {
                frame++;
                if (frame % REFRESH !== 0) { animId = requestAnimationFrame(drawNoise); return; }
                var imageData = ctx.createImageData(SIZE, SIZE);
                var data = imageData.data;
                for (var i = 0; i < data.length; i += 4) {
                    var v = Math.random() * 255;
                    data[i] = v; data[i+1] = v; data[i+2] = v; data[i+3] = ALPHA;
                }
                ctx.putImageData(imageData, 0, 0);
                animId = requestAnimationFrame(drawNoise);
            }

            resize();
            drawNoise();
            window.addEventListener('resize', resize);
        })();

        (function() {
            var query = new URLSearchParams(window.location.search);
            var isPreview = query.has('preview');
            var layoutDocId = window.__AIFLOWTIME_LAYOUT_DOC || query.get('layoutDoc') || 'consultation';
            var layoutPendingController = typeof aiflowCreateLayoutPendingController === 'function'
                ? aiflowCreateLayoutPendingController({ bodyClass: 'layout-pending', timeoutMs: 6000 })
                : { finish: function() { if (document.body) document.body.classList.remove('layout-pending'); } };

            function applyConsultationLayout(sections) {
                if (typeof applyConsultationPageLayout === 'function') {
                    applyConsultationPageLayout(sections || [], { wrapperId: 'consultation-page-bg' });
                } else if (typeof syncPageBackgroundFromSections === 'function') {
                    syncPageBackgroundFromSections(sections || [], { wrapperId: 'consultation-page-bg' });
                    if (typeof consultationUpdateNoiseLayer === 'function') consultationUpdateNoiseLayer();
                }
            }

            function finishInitialLayoutRender() {
                layoutPendingController.finish();
            }

            if (isPreview && typeof initLayoutPreviewBridge === 'function') {
                initLayoutPreviewBridge({
                    onLayoutPreview: function(sections) {
                        applyConsultationLayout(sections || []);
                        finishInitialLayoutRender();
                    }
                });
            }

            if (typeof initFirebase !== 'function' || typeof firebase === 'undefined' || !firebase.firestore) {
                applyConsultationLayout([]);
                finishInitialLayoutRender();
                return;
            }
            initFirebase(function() {
                firebase.firestore().collection('pageLayouts').doc(layoutDocId).get().then(function(doc) {
                    var data = doc.exists ? (doc.data() || {}) : null;
                    if (typeof applyFirestorePageMeta === 'function') {
                        applyFirestorePageMeta(data, { fallbackTitle: document.title });
                    }
                    applyConsultationLayout(data && Array.isArray(data.sections) ? data.sections : []);
                    finishInitialLayoutRender();
                }).catch(function() {
                    applyConsultationLayout([]);
                    finishInitialLayoutRender();
                });
            });
        })();
    </script>
