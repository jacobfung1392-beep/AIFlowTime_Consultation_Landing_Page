<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>限時優惠 | AIFLOWTIME</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --border: rgba(255,255,255,0.07);
            --border-glow: rgba(217,119,87,0.35);
            --accent: #D97757;
            --accent-dim: rgba(217,119,87,0.15);
            --accent-glow: rgba(217,119,87,0.4);
            --text: #f0ede8;
            --text-dim: rgba(240,237,232,0.55);
            --text-muted: rgba(240,237,232,0.3);
            --white: #ffffff;
            --radius: 16px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body.layout-pending .page-content {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* =============================================
           BACKGROUND "0" ANIMATION (same as Workshop 0)
        ============================================= */
        #bg-zero-wrap {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }
        #bg-zero-canvas {
            display: block;
            width: 100%; height: 100%;
            opacity: 0.3;
        }

        /* =============================================
           NOISE OVERLAY (same style as Workshop pages)
        ============================================= */
        #noise-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: transparent;
        }
        #noise-bg .radial-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle 700px at 50% 0px, rgba(217,119,87,0.18), transparent 70%);
        }
        #noise-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            image-rendering: pixelated;
        }

        .page-content { position: relative; z-index: 1; }

        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        .logo:hover { color: var(--accent); }
        .logo span { color: var(--accent); }

        #main-content {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .countdown-section {
            padding: 80px 0 60px;
            text-align: center;
        }
        .countdown-section .section-label {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .countdown-section .section-title {
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            margin-bottom: 32px;
            color: var(--text);
        }
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .countdown-unit {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 16px;
            min-width: 72px;
        }
        .countdown-unit .value {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            color: var(--accent);
            font-family: 'Courier Prime', monospace;
            line-height: 1.2;
        }
        .countdown-unit .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }
        .countdown-code-wrap { margin-bottom: 28px; }
        .countdown-code-label { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
        .countdown-code {
            display: inline-block;
            padding: 14px 28px;
            background: var(--accent-dim);
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-family: 'Courier Prime', monospace;
        }
        .countdown-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 36px;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .countdown-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px var(--accent-glow);
        }
        .countdown-expired {
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-dim);
            font-size: 16px;
        }
    </style>
</head>
<body class="layout-pending">
    <!-- Background "0" animation (same as Workshop 0) -->
    <div id="bg-zero-wrap"><canvas id="bg-zero-canvas"></canvas></div>
    <!-- Noise overlay -->
    <div id="noise-bg">
        <div class="radial-glow"></div>
        <canvas id="noise-canvas"></canvas>
    </div>

    <div class="page-content">
    <header>
        <a href="/ai-beginner-workshop" class="logo">AIFLOWTIME <span>限時優惠</span></a>
    </header>

    <main id="main-content">
        <section id="countdown-block" class="countdown-section" data-section-id="countdown_default" data-section-type="countdown">
            <div class="section-label">限時優惠</div>
            <h1 class="section-title">專屬折扣碼</h1>
            <div class="countdown-grid">
                <div class="countdown-unit"><span class="value" id="cd-days">--</span><span class="label">天</span></div>
                <div class="countdown-unit"><span class="value" id="cd-hours">--</span><span class="label">時</span></div>
                <div class="countdown-unit"><span class="value" id="cd-mins">--</span><span class="label">分</span></div>
                <div class="countdown-unit"><span class="value" id="cd-secs">--</span><span class="label">秒</span></div>
            </div>
            <div class="countdown-code-wrap">
                <div class="countdown-code-label">你的折扣碼</div>
                <div class="countdown-code" id="cd-code">—</div>
            </div>
            <a href="/workshop-payment" class="countdown-cta" id="cd-cta">Claim the discount</a>
        </section>
    </main>
    </div><!-- .page-content -->

    <!-- Background "0" glassmorphism animation (same as Workshop 0) -->
    <script>
    (function() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const CONFIG = {
            tileSize: 12,
            gap: 2,
            layerDepth: 20,
            charScale: 0.8,
            colors: {
                front: { r: 224, g: 122, b: 95 },
                back:  { r: 120, g: 120, b: 130 }
            },
            animation: {
                jitterRange: 1.5,
                jitterSpeed: 0.002,
                pulseSpeed: 0.003
            },
            rotation: { x: -35, y: 23, z: 0 },
            models: ['0']
        };
        const canvas = document.getElementById('bg-zero-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        var tiles = [];
        var time = 0;
        function Tile(localX, localY, z, cx, cy, w, h, isBackLayer) {
            this.localX = localX;
            this.localY = localY;
            this.originZ = z;
            this.cx = cx;
            this.cy = cy;
            this.w = w;
            this.h = h;
            this.isBackLayer = isBackLayer;
            this.baseAlpha = 0.15 + Math.random() * 0.35;
            this.pulseOffset = Math.random() * Math.PI * 2;
            this.jitterPhaseX = Math.random() * Math.PI * 2;
            this.jitterPhaseY = Math.random() * Math.PI * 2;
            this.screenX = 0;
            this.screenY = 0;
            this.depth = 0;
            this.currentAlpha = 1;
        }
        Tile.prototype.update = function(timestamp) {
            var jx = Math.sin(time * CONFIG.animation.jitterSpeed + this.jitterPhaseX) * CONFIG.animation.jitterRange;
            var jy = Math.cos(time * CONFIG.animation.jitterSpeed + this.jitterPhaseY) * CONFIG.animation.jitterRange;
            var x = this.localX + jx, y = this.localY + jy, z = this.originZ;
            var radX = CONFIG.rotation.x * (Math.PI / 180);
            var radY = CONFIG.rotation.y * (Math.PI / 180);
            var radZ = CONFIG.rotation.z * (Math.PI / 180);
            var y1 = y * Math.cos(radX) - z * Math.sin(radX);
            var z1 = y * Math.sin(radX) + z * Math.cos(radX);
            var x2 = x * Math.cos(radY) + z1 * Math.sin(radY);
            var z2 = -x * Math.sin(radY) + z1 * Math.cos(radY);
            var x3 = x2 * Math.cos(radZ) - y1 * Math.sin(radZ);
            var y3 = x2 * Math.sin(radZ) + y1 * Math.cos(radZ);
            this.screenX = x3 + this.cx;
            this.screenY = y3 + this.cy;
            this.depth = z2;
            var pulse = Math.sin(time * CONFIG.animation.pulseSpeed + this.pulseOffset);
            this.currentAlpha = Math.max(0, Math.min(1, this.baseAlpha + (pulse * 0.1)));
        };
        Tile.prototype.draw = function(ctx) {
            var c = this.isBackLayer ? CONFIG.colors.back : CONFIG.colors.front;
            var alpha = this.currentAlpha;
            if (this.isBackLayer) alpha *= 0.6;
            ctx.fillStyle = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + alpha + ')';
            ctx.beginPath();
            ctx.rect(this.screenX, this.screenY, this.w, this.h);
            ctx.fill();
            var borderAlpha = this.isBackLayer ? 0.1 : 0.3;
            ctx.strokeStyle = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + borderAlpha + ')';
            ctx.lineWidth = 1;
            ctx.stroke();
        };
        function createTilesForCharacter(char, cx, cy, w, h) {
            var buffer = document.createElement('canvas');
            buffer.width = w;
            buffer.height = h;
            var bctx = buffer.getContext('2d');
            bctx.fillStyle = '#000';
            bctx.font = '900 ' + (h * 0.8) + 'px Arial, Helvetica, sans-serif';
            bctx.textAlign = 'center';
            bctx.textBaseline = 'middle';
            bctx.fillText(char, w / 2, h / 2);
            var idata = bctx.getImageData(0, 0, w, h);
            var data = idata.data;
            var step = CONFIG.tileSize;
            for (var y = 0; y < h; y += step) {
                for (var x = 0; x < w; x += step) {
                    var index = (y * w + x) * 4 + 3;
                    if (data[index] > 50) {
                        var localX = x - w / 2, localY = y - h / 2;
                        var tileW = CONFIG.tileSize - CONFIG.gap, tileH = CONFIG.tileSize - CONFIG.gap;
                        var jX = (Math.random() - 0.5) * 4, jY = (Math.random() - 0.5) * 4;
                        tiles.push(new Tile(localX + jX, localY + jY, CONFIG.layerDepth / 2, cx, cy, tileW, tileH, false));
                        tiles.push(new Tile(localX + jX, localY + jY, -CONFIG.layerDepth / 2, cx, cy, tileW, tileH, true));
                    }
                }
            }
        }
        function generateScene() {
            tiles = [];
            var dpr = window.devicePixelRatio || 1;
            var screenW = canvas.width / dpr;
            var screenH = canvas.height / dpr;
            var isDesktop = screenW >= 768;
            var charBaseW = isDesktop ? 600 : Math.min(screenW * 0.85, 420);
            var charBaseH = isDesktop ? 900 : Math.min(screenH * 0.65, 630);
            var cx = screenW / 2, cy = screenH / 2;
            createTilesForCharacter('0', cx, cy, charBaseW, charBaseH);
        }
        var lastInitWidth = 0;
        function init(force) {
            var wrap = document.getElementById('bg-zero-wrap');
            var screenW = wrap ? wrap.clientWidth : window.innerWidth;
            var screenH = wrap ? wrap.clientHeight : window.innerHeight;
            if (!force && Math.abs(screenW - lastInitWidth) < 5) return;
            lastInitWidth = screenW;
            var dpr = window.devicePixelRatio || 1;
            canvas.width = screenW * dpr;
            canvas.height = screenH * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            generateScene();
        }
        function loop(timestamp) {
            time = timestamp;
            var dpr = window.devicePixelRatio || 1;
            var screenW = canvas.width / dpr;
            var screenH = canvas.height / dpr;
            ctx.clearRect(0, 0, screenW + 1, screenH + 1);
            tiles.forEach(function(t) { t.update(timestamp); });
            tiles.sort(function(a, b) { return a.depth - b.depth; });
            tiles.forEach(function(t) { t.draw(ctx); });
            requestAnimationFrame(loop);
        }
        init(true);
        requestAnimationFrame(loop);
        var resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() { init(false); }, 250);
        });
    })();
    </script>

    <!-- Noise canvas -->
    <script>
    (function() {
        var canvas = document.getElementById('noise-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d', { alpha: true });
        if (!ctx) return;
        var frame = 0, REFRESH = 2, ALPHA = 18, SIZE = 1024;
        function resize() {
            canvas.width = SIZE;
            canvas.height = SIZE;
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
        }
        function drawGrain() {
            var img = ctx.createImageData(SIZE, SIZE);
            var d = img.data;
            for (var i = 0; i < d.length; i += 4) {
                var v = Math.random() * 255;
                d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = ALPHA;
            }
            ctx.putImageData(img, 0, 0);
        }
        function loop() {
            if (frame % REFRESH === 0) drawGrain();
            frame++;
            requestAnimationFrame(loop);
        }
        window.addEventListener('resize', resize);
        resize();
        loop();
    })();
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-init.js"></script>
    <script src="/js/shared-utils.js?v=2"></script>
    <script src="/js/page-background-runtime.js"></script>
    <script>
        var _countdownQuery = new URLSearchParams(window.location.search);
        var _countdownIsPreview = _countdownQuery.get('preview') === '1';
        var _countdownLayoutDocId = window.__AIFLOWTIME_LAYOUT_DOC || _countdownQuery.get('layoutDoc') || 'countdown';
        var _countdownPendingController = typeof aiflowCreateLayoutPendingController === 'function'
            ? aiflowCreateLayoutPendingController({ bodyClass: 'layout-pending', timeoutMs: 6000 })
            : { finish: function() { if (document.body) document.body.classList.remove('layout-pending'); } };

        function _finishInitialCountdownLayoutRender() {
            _countdownPendingController.finish();
        }
        initFirebase(function() {
            var db = firebase.firestore();
            var countdownSection = document.getElementById('countdown-block');

            function applySections(rawSections) {
                if (typeof syncPageBackgroundFromSections === 'function') {
                    syncPageBackgroundFromSections(rawSections || [], { wrapperId: 'layout-page-bg' });
                }
                if (!rawSections || !rawSections.length) return;
                var sections = rawSections.slice().sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
                var countdownSec = sections.find(function(s) { return s.type === 'countdown' && s.visible !== false; });
                if (!countdownSec || !countdownSec.content) return;
                if (countdownSection && countdownSec.id) countdownSection.setAttribute('data-section-id', countdownSec.id);
                var c = countdownSec.content;
                var discountCodeId = c.discountCodeId;
                if (!discountCodeId) return;
                db.collection('discountCodes').doc(discountCodeId).get().then(function(doc) {
                    if (!doc.exists) return;
                    var d = doc.data();
                    var codeEl = document.getElementById('cd-code');
                    var ctaEl = document.getElementById('cd-cta');
                    if (codeEl) codeEl.textContent = d.code || '—';
                    if (ctaEl) {
                        ctaEl.innerHTML = typeof aiflowRenderRichTextHtml === 'function'
                            ? aiflowRenderRichTextHtml(c.ctaText || '')
                            : escHtml(c.ctaText || '').replace(/\n/g, '<br>');
                        var link = c.ctaLink || '/workshop-payment';
                        if (link.indexOf('workshop-payment') !== -1 && d.code) {
                            link += (link.indexOf('?') !== -1 ? '&' : '?') + 'promo=' + encodeURIComponent(d.code);
                        }
                        ctaEl.href = link;
                    }
                    var expiresAt = d.expiresAt;
                    if (expiresAt && (expiresAt.toDate || expiresAt.seconds)) {
                        var end = expiresAt.toDate ? expiresAt.toDate() : new Date(expiresAt.seconds * 1000);
                        runCountdown(end, countdownSection);
                    } else {
                        document.getElementById('cd-days').textContent = '—';
                        document.getElementById('cd-hours').textContent = '—';
                        document.getElementById('cd-mins').textContent = '—';
                        document.getElementById('cd-secs').textContent = '—';
                    }
                    if (c.sectionTitle) {
                        var titleEl = countdownSection.querySelector('.section-title');
                        if (titleEl) {
                            titleEl.innerHTML = typeof aiflowRenderRichTextHtml === 'function'
                                ? aiflowRenderRichTextHtml(c.sectionTitle || '')
                                : escHtml(c.sectionTitle || '').replace(/\n/g, '<br>');
                        }
                    }
                });
            }

            function runCountdown(endDate, sectionEl) {
                var daysEl = document.getElementById('cd-days');
                var hoursEl = document.getElementById('cd-hours');
                var minsEl = document.getElementById('cd-mins');
                var secsEl = document.getElementById('cd-secs');
                var grid = sectionEl.querySelector('.countdown-grid');
                var codeWrap = sectionEl.querySelector('.countdown-code-wrap');
                var cta = document.getElementById('cd-cta');

                function tick() {
                    var now = new Date();
                    if (now >= endDate) {
                        daysEl.textContent = '0';
                        hoursEl.textContent = '00';
                        minsEl.textContent = '00';
                        secsEl.textContent = '00';
                        if (grid) grid.style.display = 'none';
                        var expired = document.createElement('div');
                        expired.className = 'countdown-expired';
                        expired.textContent = '此優惠已到期。';
                        if (codeWrap && codeWrap.parentNode) codeWrap.parentNode.insertBefore(expired, codeWrap.nextSibling);
                        if (cta) cta.style.display = 'none';
                        return;
                    }
                    var diff = endDate - now;
                    var d = Math.floor(diff / 86400000);
                    var h = Math.floor((diff % 86400000) / 3600000);
                    var m = Math.floor((diff % 3600000) / 60000);
                    var s = Math.floor((diff % 60000) / 1000);
                    daysEl.textContent = String(d);
                    hoursEl.textContent = String(h).padStart(2, '0');
                    minsEl.textContent = String(m).padStart(2, '0');
                    secsEl.textContent = String(s).padStart(2, '0');
                    setTimeout(tick, 1000);
                }
                tick();
            }

            if (_countdownIsPreview) {
                initLayoutPreviewBridge({
                    onLayoutPreview: function(sections) {
                        applySections(sections);
                        _finishInitialCountdownLayoutRender();
                    }
                });
                return;
            }

            db.collection('pageLayouts').doc(_countdownLayoutDocId).get().then(function(doc) {
                var data = doc.exists ? (doc.data() || {}) : null;
                if (typeof applyFirestorePageMeta === 'function') {
                    applyFirestorePageMeta(data, { fallbackTitle: document.title });
                }
                if (doc.exists && doc.data().sections && doc.data().sections.length) {
                    applySections(doc.data().sections);
                }
                _finishInitialCountdownLayoutRender();
            }).catch(function() {
                _finishInitialCountdownLayoutRender();
            });
        });
    </script>
</body>
</html>
