<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document | AIFLOWTIME</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root { --bg-cream:#FAF9F7; --accent:#D97757; --text:#3B3B3B; --text-light:#7A7A7A; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:sans-serif;background:var(--bg-cream);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .doc-status{text-align:center;max-width:420px;}
        .doc-status h2{font-size:20px;margin-bottom:8px;}
        .doc-status p{font-size:14px;color:var(--text-light);line-height:1.6;}
        .spinner{width:40px;height:40px;border:4px solid rgba(0,0,0,0.08);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .error-icon{font-size:48px;margin-bottom:12px;}
        .back-link{display:inline-block;margin-top:16px;color:var(--accent);font-weight:700;text-decoration:none;font-size:14px;}
        .back-link:hover{text-decoration:underline;}
    </style>
</head>
<body>
    <div class="doc-status" id="statusBox">
        <div class="spinner"></div>
        <h2>正在生成文件...</h2>
        <p>Generating your document, please wait.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-init.js"></script>
    <script src="/js/shared-utils.js"></script>

    <script>
    var db;

    var FONT_URLS = [
        'https://raw.githubusercontent.com/google/fonts/main/ofl/notosanshk/NotoSansHK%5Bwght%5D.ttf',
        'https://raw.githubusercontent.com/google/fonts/main/ofl/notosanstc/NotoSansTC%5Bwght%5D.ttf'
    ];
    var FONT_CACHE_DB = 'pdfFontCache';
    var FONT_CACHE_KEY = 'cjkFontHK_v2';

    function showError(msg) {
        document.getElementById('statusBox').innerHTML =
            '<div class="error-icon">😕</div><h2>Unable to Generate Document</h2><p>' + msg + '</p>' +
            '<a class="back-link" href="/">← Back to AIFlowTime</a>';
    }

    function _setStatus(msg) {
        var box = document.getElementById('statusBox');
        var p = box && box.querySelector('p');
        if (p) p.textContent = msg;
    }

    function _loadImage(src) {
        return new Promise(function(resolve) {
            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                var c = document.createElement('canvas');
                c.width = img.naturalWidth; c.height = img.naturalHeight;
                c.getContext('2d').drawImage(img, 0, 0);
                resolve(c.toDataURL('image/png'));
            };
            img.onerror = function() { resolve(null); };
            img.src = src;
        });
    }

    function _arrayBufferToBase64(buffer) {
        var bytes = new Uint8Array(buffer);
        var binary = '';
        var chunkSize = 8192;
        for (var i = 0; i < bytes.length; i += chunkSize) {
            var chunk = bytes.subarray(i, Math.min(i + chunkSize, bytes.length));
            binary += String.fromCharCode.apply(null, chunk);
        }
        return btoa(binary);
    }

    function _openFontDB() {
        return new Promise(function(resolve) {
            try {
                var req = indexedDB.open(FONT_CACHE_DB, 1);
                req.onupgradeneeded = function(e) { e.target.result.createObjectStore('fonts'); };
                req.onsuccess = function(e) { resolve(e.target.result); };
                req.onerror = function() { resolve(null); };
            } catch(e) { resolve(null); }
        });
    }

    function _getCachedFont() {
        return _openFontDB().then(function(idb) {
            if (!idb) return null;
            return new Promise(function(resolve) {
                var tx = idb.transaction('fonts', 'readonly');
                var req = tx.objectStore('fonts').get(FONT_CACHE_KEY);
                req.onsuccess = function() { resolve(req.result || null); };
                req.onerror = function() { resolve(null); };
            });
        });
    }

    function _setCachedFont(base64) {
        return _openFontDB().then(function(idb) {
            if (!idb) return;
            var tx = idb.transaction('fonts', 'readwrite');
            tx.objectStore('fonts').put(base64, FONT_CACHE_KEY);
        }).catch(function(){});
    }

    async function _loadFont() {
        var cached = await _getCachedFont();
        if (cached) return cached;

        _setStatus('Downloading Chinese font (first time only)...');
        for (var i = 0; i < FONT_URLS.length; i++) {
            try {
                var resp = await fetch(FONT_URLS[i]);
                if (!resp.ok) continue;
                var buf = await resp.arrayBuffer();
                if (buf.byteLength < 500000) continue;
                var base64 = _arrayBufferToBase64(buf);
                _setCachedFont(base64);
                return base64;
            } catch(e) {}
        }
        return null;
    }

    function _fmtMoney(amount, currency) {
        var num = parseFloat(amount) || 0;
        var sym = { HKD:'HK$ ', USD:'US$ ', RMB:'RMB ' }[currency] || '$ ';
        var parts = num.toFixed(2).split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return sym + parts.join('.');
    }

    async function buildPdf(doc) {
        if (!window.jspdf || !window.jspdf.jsPDF) { showError('PDF library failed to load. Please refresh.'); return; }

        var fontBase64 = await _loadFont();
        var logoDataUrl = await _loadImage('/LOGO_transparent_background.png');

        var jsPDF = window.jspdf.jsPDF;
        var pdf = new jsPDF({ unit:'mm', format:'a4' });
        var W = pdf.internal.pageSize.getWidth();
        var H = pdf.internal.pageSize.getHeight();
        var margin = 20;
        var y = 14;

        var hasCJKFont = false;
        if (fontBase64) {
            try {
                pdf.addFileToVFS('NotoSansHK.ttf', fontBase64);
                pdf.addFont('NotoSansHK.ttf', 'NotoSansHK', 'normal');
                hasCJKFont = true;
            } catch(e) { hasCJKFont = false; }
        }

        function setLabel(size) { pdf.setFontSize(size); pdf.setFont('helvetica', 'bold'); }
        function setLabelNormal(size) { pdf.setFontSize(size); pdf.setFont('helvetica', 'normal'); }
        function setCJK(size) {
            pdf.setFontSize(size);
            if (hasCJKFont) pdf.setFont('NotoSansHK', 'normal');
            else pdf.setFont('helvetica', 'normal');
        }
        function setCJKBold(size) {
            pdf.setFontSize(size);
            if (hasCJKFont) pdf.setFont('NotoSansHK', 'normal');
            else pdf.setFont('helvetica', 'bold');
        }

        var pageBottom = H - 15;
        function checkPage(needed) {
            if (y + (needed || 0) > pageBottom) {
                pdf.addPage();
                y = 14;
            }
        }

        var type = doc.type || 'quotation';
        var typeLabel = { quotation:'QUOTATION', invoice:'INVOICE', receipt:'RECEIPT' }[type] || 'DOCUMENT';
        var typeSubtitle = {
            quotation:'AIFlowTime Business Quotation',
            invoice:'AIFlowTime Business Invoice',
            receipt:'AIFlowTime Payment Receipt'
        }[type] || 'AIFlowTime Business Document';

        if (type === 'receipt' && doc.receiptSubtype === 'deposit') {
            typeLabel = 'DEPOSIT RECEIPT';
            typeSubtitle = 'AIFlowTime Deposit Receipt';
        } else if (type === 'receipt' && doc.receiptSubtype === 'final') {
            typeLabel = 'FINAL RECEIPT';
            typeSubtitle = 'AIFlowTime Final Payment Receipt';
        }
        var cur = doc.currency || 'HKD';

        var dateStr = '';
        if (doc.createdAt) {
            var cd = doc.createdAt.seconds ? new Date(doc.createdAt.seconds * 1000) : new Date(doc.createdAt);
            if (!isNaN(cd.getTime())) dateStr = cd.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        }
        if (!dateStr) dateStr = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

        // ---- Top accent bar ----
        pdf.setFillColor(217, 119, 87);
        pdf.rect(0, 0, W, 8, 'F');

        // ---- Logo ----
        if (logoDataUrl) {
            var logoW = 30, logoH = 30;
            pdf.addImage(logoDataUrl, 'PNG', (W - logoW) / 2, y, logoW, logoH);
            y += logoH + 4;
        } else { y += 8; }

        // ---- Title ----
        setLabel(20);
        pdf.setTextColor(40, 40, 40);
        pdf.text(typeLabel, W / 2, y, { align:'center' });
        y += 5;
        setLabelNormal(9);
        pdf.setTextColor(120, 120, 120);
        pdf.text(typeSubtitle, W / 2, y, { align:'center' });

        // ---- Doc # and date ----
        setLabelNormal(9);
        pdf.setTextColor(100, 100, 100);
        var docNum = doc.documentNumber || '';
        pdf.text(docNum, W - margin, y - 5, { align:'right' });
        pdf.text('Date: ' + dateStr, W - margin, y, { align:'right' });

        y += 8;
        pdf.setDrawColor(220, 220, 220);
        pdf.setLineWidth(0.4);
        pdf.line(margin, y, W - margin, y);
        y += 8;

        // ---- FROM / TO side by side ----
        var colLeft = margin;
        var colRight = W / 2 + 5;
        var fromY = y;
        var toY = y;

        // FROM (left column)
        setLabel(8);
        pdf.setTextColor(160, 160, 160);
        pdf.text('FROM', colLeft, fromY);
        fromY += 5;
        var senderName = (doc.senderName || 'AIFlowTime').trim();
        setCJKBold(11);
        pdf.setTextColor(40, 40, 40);
        pdf.text(senderName, colLeft, fromY);
        fromY += 5;
        setCJK(9);
        pdf.setTextColor(100, 100, 100);
        if (doc.senderWebsite) { pdf.text(doc.senderWebsite.trim(), colLeft, fromY); fromY += 4; }
        if (doc.senderWhatsapp) { pdf.text('WhatsApp: ' + doc.senderWhatsapp.trim(), colLeft, fromY); fromY += 4; }
        if (doc.senderEmail) { pdf.text(doc.senderEmail.trim(), colLeft, fromY); fromY += 4; }

        // TO (right column)
        setLabel(8);
        pdf.setTextColor(160, 160, 160);
        pdf.text('TO', colRight, toY);
        toY += 5;
        var clientTitle = (doc.clientCompany || doc.contactPerson || 'Client').trim();
        setCJKBold(11);
        pdf.setTextColor(40, 40, 40);
        pdf.text(clientTitle, colRight, toY);
        toY += 5;
        setCJK(9);
        pdf.setTextColor(100, 100, 100);
        if (doc.clientCompany && doc.contactPerson) { pdf.text('Attn: ' + doc.contactPerson.trim(), colRight, toY); toY += 4; }
        if (doc.email) { pdf.text(doc.email.trim(), colRight, toY); toY += 4; }
        if (doc.phone) { pdf.text('Tel: ' + doc.phone.trim(), colRight, toY); toY += 4; }

        y = Math.max(fromY, toY) + 7;

        // ---- Items table header ----
        pdf.setFillColor(245, 245, 245);
        pdf.rect(margin, y, W - margin * 2, 8, 'F');
        setLabel(9);
        pdf.setTextColor(80, 80, 80);
        pdf.text('DESCRIPTION', margin + 4, y + 5.5);
        pdf.text('AMOUNT', W - margin - 4, y + 5.5, { align:'right' });
        y += 12;

        // ---- Line items ----
        var items = doc.items || [];
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            setCJK(10);
            var desc = (item.description || '').trim();
            var paragraphs = desc.split(/\r?\n/);
            var descLines = [];
            paragraphs.forEach(function(p) {
                var wrapped = pdf.splitTextToSize(p, W - margin * 2 - 50);
                descLines = descLines.concat(wrapped);
            });
            if (descLines.length === 0) descLines = [''];
            checkPage(descLines.length * 4.5 + 3);
            pdf.setTextColor(40, 40, 40);
            pdf.text(descLines, margin + 4, y);
            setLabelNormal(10);
            pdf.setTextColor(80, 80, 80);
            pdf.text(_fmtMoney(item.price, cur), W - margin - 4, y, { align:'right' });
            y += descLines.length * 4.5 + 3;
        }

        y += 4;
        pdf.setDrawColor(220, 220, 220);
        pdf.line(margin, y, W - margin, y);
        y += 6;

        // ---- Subtotal block (keep subtotal through total together) ----
        var totalsHeight = 6 + 2 + 8 + 10;
        if (doc.discountType && doc.discountType !== 'none' && doc.discountAmount > 0) totalsHeight += 6;
        if (doc.taxEnabled && doc.taxAmount > 0) totalsHeight += 6;
        checkPage(totalsHeight);

        var rightCol = W - margin - 4;
        setLabelNormal(10);
        pdf.setTextColor(100, 100, 100);
        pdf.text('Subtotal', margin + 4, y);
        pdf.text(_fmtMoney(doc.subtotal || 0, cur), rightCol, y, { align:'right' });
        y += 6;

        // ---- Discount ----
        if (doc.discountType && doc.discountType !== 'none' && doc.discountAmount > 0) {
            var discLabel = 'Discount';
            if (doc.discountType === 'percentage') discLabel += ' (' + (doc.discountValue || 0) + '%)';
            pdf.setTextColor(46, 125, 50);
            pdf.text(discLabel, margin + 4, y);
            pdf.text('-' + _fmtMoney(doc.discountAmount, cur), rightCol, y, { align:'right' });
            y += 6;
        }

        // ---- Tax ----
        if (doc.taxEnabled && doc.taxAmount > 0) {
            pdf.setTextColor(100, 100, 100);
            pdf.text('Tax (' + (doc.taxRate || 0) + '%)', margin + 4, y);
            pdf.text('+' + _fmtMoney(doc.taxAmount, cur), rightCol, y, { align:'right' });
            y += 6;
        }

        y += 2;
        pdf.setDrawColor(180, 180, 180);
        pdf.setLineWidth(0.6);
        pdf.line(margin, y, W - margin, y);
        y += 8;

        // ---- Total ----
        var totalLabel = { quotation:'TOTAL', invoice:'TOTAL DUE', receipt:'TOTAL PAID' }[type] || 'TOTAL';
        if (doc.receiptSubtype === 'deposit') totalLabel = 'DEPOSIT PAID';
        else if (doc.receiptSubtype === 'final') totalLabel = 'FINAL PAYMENT';
        setLabel(12);
        pdf.setTextColor(40, 40, 40);
        pdf.text(totalLabel, margin + 4, y);
        pdf.setTextColor(217, 119, 87);
        pdf.text(_fmtMoney(doc.total || 0, cur), rightCol, y, { align:'right' });
        y += 10;

        // ---- Signature / Stamp (invoice only, right below total) ----
        if (type === 'invoice') {
            y += 18;
            var sigLineX = W / 2;
            var sigLineEnd = W - margin;
            pdf.setDrawColor(160, 160, 160);
            pdf.setLineWidth(0.4);
            pdf.line(sigLineX, y, sigLineEnd, y);
            y += 4;
            setLabelNormal(7);
            pdf.setTextColor(140, 140, 140);
            pdf.text('Authorized Signature / Stamp', sigLineEnd, y, { align: 'right' });
            y += 8;
        }

        // ---- Status badge ----
        if (doc.status && doc.status !== 'draft') {
            var badgeLabel = doc.status.toUpperCase();
            var badgeColors = {
                sent:      { bg:[232,240,254], text:[21,101,192] },
                accepted:  { bg:[232,245,233], text:[46,125,50] },
                paid:      { bg:[232,245,233], text:[46,125,50] },
                issued:    { bg:[232,245,233], text:[46,125,50] },
                overdue:   { bg:[255,235,238], text:[198,40,40] },
                rejected:  { bg:[255,235,238], text:[198,40,40] },
                expired:   { bg:[255,243,224], text:[230,81,0] },
                cancelled: { bg:[255,235,238], text:[198,40,40] }
            };
            var bc = badgeColors[doc.status] || badgeColors.sent;
            pdf.setFillColor(bc.bg[0], bc.bg[1], bc.bg[2]);
            setLabel(9);
            var badgeW = pdf.getTextWidth(badgeLabel) + 12;
            pdf.roundedRect(margin, y, Math.max(badgeW, 40), 8, 2, 2, 'F');
            pdf.setTextColor(bc.text[0], bc.text[1], bc.text[2]);
            pdf.text(badgeLabel, margin + 4, y + 5.5);
            y += 14;
        } else { y += 4; }

        // ---- Validity / Due date ----
        if (type === 'quotation' && doc.validUntil) {
            setLabel(9);
            pdf.setTextColor(100, 100, 100);
            pdf.text('Valid Until: ' + doc.validUntil, margin + 4, y);
            y += 6;
        }
        if (type === 'invoice' && doc.dueDate) {
            setLabel(9);
            pdf.setTextColor(100, 100, 100);
            pdf.text('Due Date: ' + doc.dueDate, margin + 4, y);
            y += 6;
        }

        // ---- Payment Terms (small, CJK) ----
        if (doc.paymentTerms) {
            setCJK(5.5);
            var ptLines = pdf.splitTextToSize(doc.paymentTerms.trim(), W - margin * 2 - 8);
            checkPage(4 + 3 + ptLines.length * 2.5 + 2);
            pdf.setDrawColor(220, 220, 220);
            pdf.setLineWidth(0.4);
            pdf.line(margin, y, W - margin, y);
            y += 4;
            setLabel(6);
            pdf.setTextColor(140, 140, 140);
            pdf.text('PAYMENT TERMS', margin + 4, y);
            y += 3;
            setCJK(5.5);
            pdf.setTextColor(120, 120, 120);
            pdf.text(ptLines, margin + 4, y);
            y += ptLines.length * 2.5 + 2;
        }

        // ---- Terms & Conditions (small, CJK) ----
        if (doc.termsAndConditions) {
            setCJK(5.5);
            var tcLines = pdf.splitTextToSize(doc.termsAndConditions.trim(), W - margin * 2 - 8);
            checkPage(4 + 3 + tcLines.length * 2.5 + 2);
            if (!doc.paymentTerms) {
                pdf.setDrawColor(220, 220, 220); pdf.setLineWidth(0.4);
                pdf.line(margin, y, W - margin, y); y += 4;
            }
            setLabel(6);
            pdf.setTextColor(140, 140, 140);
            pdf.text('TERMS & CONDITIONS', margin + 4, y);
            y += 3;
            setCJK(5.5);
            pdf.setTextColor(120, 120, 120);
            pdf.text(tcLines, margin + 4, y);
            y += tcLines.length * 2.5 + 2;
        }

        // ---- Notes (small, CJK) ----
        if (doc.notes) {
            setCJK(5.5);
            var nLines = pdf.splitTextToSize(doc.notes.trim(), W - margin * 2 - 8);
            checkPage(4 + 3 + nLines.length * 2.5 + 2);
            if (!doc.paymentTerms && !doc.termsAndConditions) {
                pdf.setDrawColor(220, 220, 220); pdf.setLineWidth(0.4);
                pdf.line(margin, y, W - margin, y); y += 4;
            }
            setLabel(6);
            pdf.setTextColor(140, 140, 140);
            pdf.text('NOTES', margin + 4, y);
            y += 3;
            setCJK(5.5);
            pdf.setTextColor(120, 120, 120);
            pdf.text(nLines, margin + 4, y);
            y += nLines.length * 2.5 + 2;
        }

        // ---- Footer ----
        checkPage(14);

        pdf.setDrawColor(220, 220, 220);
        pdf.setLineWidth(0.4);
        pdf.line(margin, y, W - margin, y);
        y += 4;
        setCJK(7);
        pdf.setTextColor(160, 160, 160);
        var footerSender = (doc.senderName || 'AIFlowTime').trim();
        pdf.text('This document is generated by ' + footerSender + '.', margin, y);
        y += 3;
        if (doc.senderWhatsapp) {
            pdf.text('For enquiries, please contact us via WhatsApp at ' + doc.senderWhatsapp.trim() + '.', margin, y);
        }

        // ---- Bottom accent bar on every page ----
        var totalPages = pdf.internal.getNumberOfPages();
        for (var pg = 1; pg <= totalPages; pg++) {
            pdf.setPage(pg);
            pdf.setFillColor(217, 119, 87);
            pdf.rect(0, H - 6, W, 6, 'F');
        }

        // ---- Output ----
        var fileName = typeLabel.replace(/\s+/g, '_') + '_' + (clientTitle.replace(/\s+/g, '_') || 'Document') + '.pdf';
        pdf.save(fileName);

        document.getElementById('statusBox').innerHTML =
            '<div style="font-size:48px;margin-bottom:12px;">✅</div>' +
            '<h2>文件已下載</h2>' +
            '<p>Your document <strong>' + fileName + '</strong> has been downloaded.</p>' +
            '<button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;">重新下載 Download Again</button>' +
            '<br><a class="back-link" href="/business-cms">← 返回業務管理</a>';
    }

    initFirebase(function() {
        db = firebase.firestore();

        (async function init() {
            var params = new URLSearchParams(window.location.search);
            var docId = params.get('id');
            if (!docId) { showError('Missing document ID.'); return; }

            try {
                var snap = await db.collection('businessDocuments').doc(docId).get();
                if (!snap.exists) { showError('Document not found. The link may be invalid.'); return; }
                var docData = snap.data();
                docData._id = snap.id;
                await buildPdf(docData);
            } catch(err) {
                showError('Failed to load document: ' + err.message);
            }
        })();
    });
    </script>
</body>
</html>
