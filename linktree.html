    <style>
        :root {
            --brand-blue: #2563EB;
            --brand-orange: #D97706;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --bg-light: #F8F9FA;

        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
            background: #071b42;
            transition: background-color 0.7s ease;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            position: relative;
        }
        
        body.dark-mode {
            background: linear-gradient(180deg, #071b42 0%, #08204a 42%, #040d21 100%);
            color: #ffffff;
        }
        
        body.layout-page-bg-active,
        body.layout-page-bg-active.dark-mode {
            background: transparent;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
            pointer-events: none;
            transition: background-color 0.7s ease;

        body.dark-mode::before {

        body.layout-page-bg-active::before {
            background: transparent !important;
        }
        
        /* Background Grid */
        .background-grid-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .day-grid {
            position: absolute;
            inset: 0;

            background-image: linear-gradient(#E5E7EB 1px, transparent 1px), linear-gradient(90deg, #E5E7EB 1px, transparent 1px);

            transform-origin: top center;
        }
        
        .night-grid {
            position: absolute;
            inset: 0;
            transition: opacity 0.7s ease;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }
        
        .day-grid.hidden {
            opacity: 0;
        }
        
        .night-grid.hidden {
            opacity: 0;
        }
        
        .flashlight-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-color: rgba(217, 119, 6, 0.1);
            transition: background-color 0.7s ease;
        }
        
        body.dark-mode .flashlight-overlay {
            background-color: rgba(217, 119, 6, 0.05);
        }
        
        /* SKY TOGGLE CSS */
        .sky-toggle-wrapper {
            --toggle-size: 12px;
            --container-width: 5.625em;
            --container-height: 2.5em;
            --container-radius: 6.25em;
            --container-light-bg: #3D7EAE;
            --container-night-bg: #1D1F2C;
            --circle-container-diameter: 3.375em;
            --sun-moon-diameter: 2.125em;
            --sun-bg: #ECCA2F;
            --moon-bg: #C4C9D1;
            --spot-color: #959DB1;
            --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
            --stars-color: #fff;
            --clouds-color: #F3FDFF;
            --back-clouds-color: #AACADF;
            --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
            --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
            font-size: var(--toggle-size);
        }
        
        .theme-switch {
            display: inline-block;
        }
        
        .theme-switch__container {
            width: var(--container-width);
            height: var(--container-height);
            background-color: var(--container-light-bg);
            border-radius: var(--container-radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0em -0.062em 0.062em rgba(0, 0, 0, 0.25), 0em 0.062em 0.125em rgba(255, 255, 255, 0.94);
            transition: var(--transition);
            position: relative;
        }
        
        .theme-switch__container::before {
            content: "";
            position: absolute;
            z-index: 1;
            inset: 0;
            box-shadow: 0em 0.05em 0.187em rgba(0, 0, 0, 0.25) inset, 0em 0.05em 0.187em rgba(0, 0, 0, 0.25) inset;
            border-radius: var(--container-radius);
        }
        
        .theme-switch__checkbox {
            display: none;
        }
        
        .theme-switch__circle-container {
            width: var(--circle-container-diameter);
            height: var(--circle-container-diameter);
            background-color: rgba(255, 255, 255, 0.1);
            position: absolute;
            left: var(--circle-container-offset);
            top: var(--circle-container-offset);
            border-radius: var(--container-radius);
            box-shadow: inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), 0 0 0 0.625em rgba(255, 255, 255, 0.1), 0 0 0 1.25em rgba(255, 255, 255, 0.1);
            display: flex;
            transition: var(--circle-transition);
            pointer-events: none;
        }
        
        .theme-switch__sun-moon-container {
            pointer-events: auto;
            position: relative;
            z-index: 2;
            width: var(--sun-moon-diameter);
            height: var(--sun-moon-diameter);
            margin: auto;
            border-radius: var(--container-radius);
            background-color: var(--sun-bg);
            box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset;
            filter: drop-shadow(0.062em 0.125em 0.125em rgba(0, 0, 0, 0.25)) drop-shadow(0em 0.062em 0.125em rgba(0, 0, 0, 0.25));
            overflow: hidden;
            transition: var(--transition);
        }
        
        .theme-switch__moon {
            transform: translateX(100%);
            width: 100%;
            height: 100%;
            background-color: var(--moon-bg);
            border-radius: inherit;
            box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #969696 inset;
            transition: var(--transition);
            position: relative;
        }
        
        .theme-switch__spot {
            position: absolute;
            top: 0.75em;
            left: 0.312em;
            width: 0.75em;
            height: 0.75em;
            border-radius: var(--container-radius);
            background-color: var(--spot-color);
            box-shadow: 0em 0.0312em 0.062em rgba(0, 0, 0, 0.25) inset;
        }
        
        .theme-switch__spot:nth-of-type(2) {
            width: 0.375em;
            height: 0.375em;
            top: 0.937em;
            left: 1.375em;
        }
        
        .theme-switch__spot:nth-last-of-type(3) {
            width: 0.25em;
            height: 0.25em;
            top: 0.312em;
            left: 0.812em;
        }
        
        .theme-switch__clouds {
            width: 1.25em;
            height: 1.25em;
            background-color: var(--clouds-color);
            border-radius: var(--container-radius);
            position: absolute;
            bottom: -0.625em;
            left: 0.312em;
            box-shadow: 0.937em 0.312em var(--clouds-color), -0.312em -0.312em var(--back-clouds-color), 1.437em 0.375em var(--clouds-color), 0.5em -0.125em var(--back-clouds-color), 2.187em 0 var(--clouds-color), 1.25em -0.062em var(--back-clouds-color), 2.937em 0.312em var(--clouds-color), 2em -0.312em var(--back-clouds-color), 3.625em -0.062em var(--clouds-color), 2.625em 0em var(--back-clouds-color), 4.5em -0.312em var(--clouds-color), 3.375em -0.437em var(--back-clouds-color), 4.625em -1.75em 0 0.437em var(--clouds-color), 4em -0.625em var(--back-clouds-color), 4.125em -2.125em 0 0.437em var(--back-clouds-color);
            transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
        }
        
        .theme-switch__stars-container {
            position: absolute;
            color: var(--stars-color);
            top: -100%;
            left: 0.312em;
            width: 2.75em;
            height: auto;
            transition: var(--transition);
        }
        
        .theme-switch__checkbox:checked + .theme-switch__container {
            background-color: var(--container-night-bg);
        }
        
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container {
            left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
        }
        
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover {
            left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em);
        }
        
        .theme-switch__circle-container:hover {
            left: calc(var(--circle-container-offset) + 0.187em);
        }
        
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon {
            transform: translate(0);
        }
        
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds {
            bottom: -4.062em;
        }
        
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container {
            top: 50%;
            transform: translateY(-50%);
        }
        
        /* Header */
        .linktree-header {
            padding: 2rem 1rem 1rem;

        /* Flashlight Grid Effect */
        .flashlight-grid {
            mask-image: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y),
                black 0%,
                transparent 100%
            );
            -webkit-mask-image: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y),
                black 0%,
                transparent 100%
            );
        }
        
        /* Keep default content visible while the managed layout hydrates. */
        body.layout-pending [data-section-id^="_tpl_"] {
            opacity: 0 !important;
        }

        /* Avoid flash: first paint uses default hero width; CMS heroMediaSizePercent applies on second pass. */
        body.layout-pending .linktree-hero:not([data-layout-hero-baked]) .hero-media-wrap {
            opacity: 0
        }
        
        /*
         * These properties force GPU layer promotion and prevent memory reclamation
         */
        .fade-in, .link-item, .linktree-divider-block, .linktree-header, .linktree-footer {
            /* Force GPU layer promotion - keeps element in GPU memory */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            
            /* Tell browser to keep this element ready for changes */
            will-change: opacity, transform;
            
            /* Prevent browser from hiding/removing this element */
            content-visibility: visible;
            
            /* Create isolated rendering context */
            contain: layout style;
            
            /* Ensure element is always rendered */
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        
        /* Fade in animation - elements start visible, no disappearing */
        .fade-in {
            opacity: 1;
            transform: translateZ(0); /* GPU layer, no Y offset */
        }
        
        /* Initial state before animation (applied via JS) */
        .fade-in.fade-pending {
            opacity: 0;
            transform: translateZ(0) translateY(20px);
            transition: opacity 0.6s ease-in, transform 0.6s ease-in;
        }
        
        /* Animated state - final visible state */
        .fade-in.animated {
            opacity: 1;
            transform: translateZ(0) translateY(0);
        }
        
        /* Link items - always visible after animation */
        .link-item {
            opacity: 1;
            transform: translateZ(0);
        }
        
        /* Initial state before animation (applied via JS) */
        .link-item.fade-pending {
            opacity: 0;
            transform: translateZ(0) translateY(20px);
            transition: opacity 0.6s ease-in, transform 0.6s ease-in;
        }
        
        .link-item.animated {
            opacity: 1;
            transform: translateZ(0) translateY(0);
        }
        
        .link-item.fade-pending:nth-child(1) { transition-delay: 0.1s; }
        .link-item.fade-pending:nth-child(2) { transition-delay: 0.2s; }
        .link-item.fade-pending:nth-child(3) { transition-delay: 0.3s; }
        .link-item.fade-pending:nth-child(4) { transition-delay: 0.4s; }
        .link-item.fade-pending:nth-child(5) { transition-delay: 0.5s; }
        .link-item.fade-pending:nth-child(6) { transition-delay: 0.6s; }

        /* Floating draggable icon */
        .floating-icon-wrap {
            position: fixed;
            z-index: 120000;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: filter 0.2s;
        }
        .floating-icon-wrap:active { cursor: grabbing; }
        .floating-icon-wrap a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            pointer-events: auto;
        }
        .floating-icon-wrap img {
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            border-radius: 8px;
        }
        .floating-icon-scale-stage {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .floating-icon-scale-inner {
            flex-shrink: 0;
            transform-origin: center center;
            border-radius: 8px;
            line-height: 0;
        }
        .floating-icon-scale-inner iframe {
            display: block;
            border: none;
            border-radius: 8px;
            pointer-events: none;
            overflow: hidden;
        }
        @keyframes fi-bob {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .floating-icon-wrap.fi-idle {
            animation: fi-bob 3s ease-in-out infinite;
        }

        // Optimized fade-in animation: Elements stay visible forever after first animation
        // CRITICAL: This prevents elements from disappearing on scroll
        function initFadeInAnimations() {
            const fadeElements = document.querySelectorAll('.fade-in, .link-item');
            
            // Step 1: Mark elements for animation (add pending state)
            fadeElements.forEach(el => {
                if (el.matches && el.matches('header.linktree-hero')) return;
                if (!el.classList.contains('animated')) {
                    el.classList.add('fade-pending');
                }
            });
            
            // Step 2: Create IntersectionObserver to trigger animation only once
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const el = entry.target;
                    
                    // Only animate if element is intersecting and hasn't been animated yet
                    if (entry.isIntersecting && !el.classList.contains('animated')) {
                        // Add animated class to trigger transition
                        el.classList.add('animated');
                        
                        // After transition completes, remove pending state and clean up
                        // This ensures element stays visible forever
                        setTimeout(() => {
                            el.classList.remove('fade-pending');
                            // Reset will-change to auto to free up GPU memory
                            // But keep transform for layer promotion
                            el.style.willChange = 'auto';
                        }, 700); // Slightly longer than transition duration
                        
                        // Stop observing - this element is done forever
                        observer.unobserve(el);
                    }
                });
            }, {
                threshold: 0.1, // Trigger when 10% visible
                rootMargin: '50px 0px 0px 0px' // Start animation before element enters viewport
            });
            
            // Step 3: Observe all elements that need animation
            fadeElements.forEach(el => {
                if (el.matches && el.matches('header.linktree-hero')) return;
                if (!el.classList.contains('animated')) {
                    observer.observe(el);
                }
            });
        }
        
        // Initialize fade-in animations immediately (synchronous)
        // This runs before any scroll can happen

                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')

        function _richTextHtml(value) {
            var raw = value == null ? '' : String(value);
            if (!raw.trim()) return '';

            return _escHtml(raw).replace(/\n/g, '<br>');

            var linkUrl = String((lnk && lnk.url) || '').trim();
            var redirectUrl = String((popup && popup.redirectUrl) || '').trim();
            if (!redirectUrl && linkUrl && linkUrl !== '#') redirectUrl = linkUrl;
            return {

                descriptionHtml: _richTextHtml((popup && popup.description) || lnk.description || ''),

            event.preventDefault();

            const nameInput = document.getElementById('whatsappNameInput');
            const numberInput = document.getElementById('whatsappNumberInput');
            const consentCheckbox = document.getElementById('whatsappConsentCheckbox');
            const modalConfig = activeWhatsAppModalConfig || {};

            const name = nameInput.value.trim();

                    timestamp: timestamp,
                    source: 'linktree-link-list-' + sourceKeySuffix,
                    page: sourceLabel
                };
                
                console.log('Submitting lead magnet form:', formData);
                
                const googleScriptURL = 'https://script.google.com/macros/s/AKfycbwcEjkz6roPWxKFyap-Jdn-q87F3Y7tOmhbLWH3HHgywuKsWP9z8oAaupjEhJLrPQDiew/exec';
                
                console.log('Sending POST request to:', googleScriptURL);
                
                const sheetPromise = fetch(googleScriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                }).then(() => {
                    console.log('✅ Form submission sent successfully');
                }).catch(err => {
                    console.error('❌ Error submitting form:', err);
                });
                const mirrorPromise = typeof saveFormSubmissionMirror === 'function'
                    ? saveFormSubmissionMirror({
                        formType: 'lead-magnet',
                        sourceKey: formData.source,
                        sourceLabel: sourceLabel,
                        sourcePage: formData.page,

                        },

                    }).catch(err => {
                        console.error('❌ Error mirroring lead magnet form:', err);

                    : Promise.resolve();
                
                closeWhatsAppModal();
                await Promise.allSettled([sheetPromise, mirrorPromise]);
                
                var nextUrl = String(modalConfig.redirectUrl || '').trim();

                setTimeout(() => {

            }
        }
