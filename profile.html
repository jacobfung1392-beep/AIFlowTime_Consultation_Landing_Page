<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F7WMPCPC92"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-F7WMPCPC92');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人檔案 | AIFLOWTIME</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FAF9F7; --bg-off: #E8E4DF; --bg-pampas: #F4F3EE;
            --accent: #D97757; --accent-text: #C45A3A; --accent-dark: #C56A4B;
            --text: #3B3B3B; --text-light: #7A7A7A; --white: #FFFFFF;
            --glass-bg: rgba(255,255,255,0.25); --glass-border: rgba(255,255,255,0.4); --shadow: rgba(0,0,0,0.1);
            --green: #2E7D32; --green-bg: rgba(76,175,80,0.15); --red: #C62828;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; overflow-x:hidden; }
        body { font-family:'Noto Sans TC',sans-serif; background:var(--bg-cream); color:var(--text); line-height:1.7; font-size:16px; font-weight:400; min-height:100vh; overflow-x:hidden; }

        /* Header */
        .p-header { position:sticky; top:0; z-index:100; background:rgba(250,249,247,0.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid rgba(0,0,0,0.06); padding:16px 24px; }
        .p-header-inner { display:flex; justify-content:space-between; align-items:center; max-width:800px; margin:0 auto; }
        .p-logo { font-size:1.15rem; font-weight:700; color:var(--text); text-decoration:none; }
        .p-logo span { color:var(--accent); }
        .p-back { display:inline-flex; align-items:center; gap:6px; color:var(--text-light); text-decoration:none; font-size:14px; font-weight:600; transition:color 0.3s; }
        .p-back:hover { color:var(--accent); }

        .container { max-width:800px; margin:0 auto; padding:32px 24px 80px; }

        /* Login screen */
        .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; padding:24px; text-align:center; }
        .login-card { background:var(--glass-bg); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:20px; padding:48px 40px; box-shadow:0 8px 32px var(--shadow); max-width:420px; width:100%; }
        .login-card h1 { font-size:28px; margin-bottom:8px; font-weight:700; }
        .login-card p { color:var(--text-light); margin-bottom:32px; font-weight:500; }
        .google-btn { display:inline-flex; align-items:center; gap:12px; height:48px; padding:0 24px; background:var(--white); color:var(--text); border:1px solid var(--bg-off); border-radius:12px; font-weight:600; font-size:15px; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
        .google-btn:hover { box-shadow:0 4px 16px rgba(0,0,0,0.12); transform:translateY(-1px); }
        .google-btn svg { width:20px; height:20px; }

        /* Glass card */
        .glass-card { background:var(--glass-bg); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:20px; padding:32px; box-shadow:0 8px 32px var(--shadow); margin-bottom:28px; }

        .section-title { font-size:20px; font-weight:700; margin-bottom:0; }
        .section-desc { font-size:14px; color:var(--text-light); font-weight:500; margin-bottom:0; }

        /* Collapsible sections */
        .collapsible-card { padding:0; overflow:hidden; }
        .collapsible-header { display:flex; align-items:center; justify-content:space-between; padding:24px 32px; cursor:pointer; user-select:none; transition:background 0.2s; gap:12px; }
        .collapsible-header:hover { background:rgba(0,0,0,0.015); }
        .collapsible-header-left { flex:1; min-width:0; }
        .collapsible-header-left .section-title { margin-bottom:2px; }
        .collapsible-toggle { width:28px; height:28px; border-radius:50%; background:var(--bg-off); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.3s; font-size:14px; color:var(--text-light); }
        .collapsible-card.open .collapsible-toggle { background:var(--accent); color:var(--white); transform:rotate(180deg); }
        .collapsible-body { max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
        .collapsible-card.open .collapsible-body { max-height:3000px; }
        .collapsible-body-inner { padding:0 32px 28px; border-top:1px solid rgba(0,0,0,0.06); }
        .collapsible-body-inner > *:first-child { margin-top:20px; }

        /* Profile avatar */
        .avatar-wrap { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
        .avatar-img { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--bg-off); background:var(--bg-off); cursor:pointer; transition:border-color 0.3s; }
        .avatar-img:hover { border-color:var(--accent); }
        .avatar-info h2 { font-size:22px; font-weight:700; }
        .avatar-info p { font-size:14px; color:var(--text-light); font-weight:500; }
        .avatar-upload { display:none; }
        .avatar-change { font-size:13px; color:var(--accent); font-weight:700; cursor:pointer; text-decoration:none; }
        .avatar-change:hover { text-decoration:underline; }

        /* Form */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
        @media (max-width:520px) { .form-grid { grid-template-columns:1fr; } }
        .form-grid.full { grid-template-columns:1fr; }
        .field { display:flex; flex-direction:column; gap:4px; }
        .field label { font-size:13px; font-weight:700; color:var(--text-light); }
        .field label .req { color:var(--accent); margin-left:2px; }
        .field input, .field select, .field textarea { height:44px; padding:0 14px; border:1.5px solid var(--bg-off); border-radius:10px; font-family:'Noto Sans TC',sans-serif; font-size:15px; background:var(--white); color:var(--text); transition:border-color 0.3s; font-weight:500; }
        .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--accent); }
        .field textarea { height:auto; min-height:72px; padding:12px 14px; resize:vertical; }
        .checkbox-group { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
        .checkbox-group label { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:500; color:var(--text); cursor:pointer; padding:8px 12px; border-radius:10px; border:1.5px solid var(--bg-off); transition:all 0.2s; background:var(--white); }
        .checkbox-group label:hover { border-color:var(--accent); }
        .checkbox-group label.checked { border-color:var(--accent); background:rgba(217,119,87,0.05); }
        .checkbox-group input[type="checkbox"] { width:18px; height:18px; accent-color:var(--accent); flex-shrink:0; cursor:pointer; }

        .optional-badge { display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; background:rgba(0,0,0,0.05); color:var(--text-light); margin-left:6px; vertical-align:middle; }

        /* Buttons */
        .btn { display:inline-flex; align-items:center; justify-content:center; height:48px; padding:0 32px; background:var(--accent); color:var(--white); text-decoration:none; border-radius:12px; font-weight:700; font-size:16px; transition:all 0.3s ease; border:none; cursor:pointer; min-width:160px; }
        .btn:hover { background:var(--accent-dark); transform:translateY(-1px); }
        .btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
        .btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); }
        .btn-outline:hover { background:var(--accent); color:var(--white); }
        .btn-sm { height:36px; padding:0 16px; font-size:13px; min-width:auto; }

        /* Workshop history */
        .ws-history-item { display:flex; justify-content:space-between; align-items:flex-start; padding:18px 20px; border-radius:14px; border:1px solid var(--bg-off); background:var(--white); margin-bottom:10px; gap:12px; flex-wrap:wrap; transition:box-shadow 0.2s; }
        .ws-history-item:hover { box-shadow:0 2px 12px rgba(0,0,0,0.06); }
        .ws-history-item .ws-h-title { font-weight:700; font-size:15px; }
        .ws-history-item .ws-h-meta { font-size:13px; color:var(--text-light); font-weight:500; margin-top:4px; display:flex; flex-wrap:wrap; gap:4px 12px; }
        .ws-history-item .ws-h-meta-icon { display:inline-flex; align-items:center; gap:4px; }
        .ws-history-item .ws-h-meta-icon svg { width:13px; height:13px; flex-shrink:0; }
        .ws-history-item .ws-h-desc { font-size:13px; color:var(--text-light); font-weight:400; margin-top:6px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .ws-h-status { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; white-space:nowrap; flex-shrink:0; }
        .ws-h-status.pending { background:rgba(255,152,0,0.12); color:#E65100; }
        .ws-h-status.confirmed { background:var(--green-bg); color:var(--green); }
        .ws-h-status.cancelled { background:rgba(198,40,40,0.1); color:#C62828; }
        .ws-h-status.deleted { background:rgba(0,0,0,0.06); color:#9E9E9E; text-decoration:line-through; }
        .ws-h-status.completed { background:rgba(0,0,0,0.06); color:var(--text-light); }
        .ws-h-status.awaiting_payment { background:rgba(255,152,0,0.12); color:#E65100; }
        .ws-upcoming-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:8px; background:rgba(33,150,243,0.1); color:#1565C0; font-size:11px; font-weight:700; margin-top:6px; }
        .ws-section-label { font-size:13px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; margin-top:4px; }
        .ws-h-clickable { border-color:var(--accent); border-style:dashed; cursor:pointer; }
        .ws-h-clickable:hover { border-color:var(--accent); background:rgba(217,119,87,0.03); box-shadow:0 4px 16px rgba(0,0,0,0.08); }
        .ws-h-cta { font-size:13px; font-weight:700; color:var(--accent); margin-top:8px; }
        .ws-h-screenshot-wrap { display:flex; align-items:center; gap:10px; margin-top:10px; padding:8px 12px; border-radius:10px; background:rgba(0,0,0,0.02); border:1px solid var(--bg-off); }
        .ws-h-screenshot-thumb { width:48px; height:48px; object-fit:cover; border-radius:8px; border:1px solid var(--bg-off); flex-shrink:0; }
        .ws-h-screenshot-label { font-size:12px; color:var(--text-light); font-weight:500; }

        /* QR Code attendance card */
        .ws-h-qr-wrap { margin-top:12px; padding:14px; border-radius:12px; background:linear-gradient(135deg, rgba(46,125,50,0.06), rgba(46,125,50,0.02)); border:1.5px solid rgba(46,125,50,0.2); text-align:center; }
        .ws-h-qr-label { font-size:12px; font-weight:700; color:var(--green); margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:6px; }
        .ws-h-qr-canvas { border-radius:8px; background:var(--white); padding:8px; display:inline-block; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
        .ws-h-qr-note { font-size:11px; color:var(--text-light); margin-top:8px; font-weight:500; }

        /* Receipt button */
        .ws-h-receipt-btn { display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:10px 18px; border-radius:10px; background:linear-gradient(135deg, rgba(121,85,72,0.08), rgba(121,85,72,0.03)); border:1.5px solid rgba(121,85,72,0.2); color:#5D4037; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; }
        .ws-h-receipt-btn:hover { background:rgba(121,85,72,0.12); border-color:rgba(121,85,72,0.35); transform:translateY(-1px); }
        .ws-h-receipt-btn svg { width:16px; height:16px; }

        /* Location card */
        .ws-h-location-wrap { margin-top:12px; padding:12px 14px; border-radius:12px; background:linear-gradient(135deg, rgba(121,85,72,0.06), rgba(121,85,72,0.02)); border:1.5px solid rgba(121,85,72,0.18); display:flex; align-items:flex-start; gap:8px; }
        .ws-h-location-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
        .ws-h-location-text { font-size:13px; font-weight:600; color:var(--text); line-height:1.5; }
        .ws-h-location-label { font-size:11px; font-weight:700; color:#795548; margin-bottom:2px; }

        /* Zoom link card */
        .ws-h-zoom-wrap { margin-top:12px; padding:14px; border-radius:12px; background:linear-gradient(135deg, rgba(33,150,243,0.06), rgba(33,150,243,0.02)); border:1.5px solid rgba(33,150,243,0.2); text-align:center; }
        .ws-h-zoom-label { font-size:12px; font-weight:700; color:#1565C0; margin-bottom:8px; }
        .ws-h-zoom-link { display:block; font-size:13px; font-weight:600; color:#1565C0; word-break:break-all; text-decoration:underline; padding:8px 12px; background:rgba(33,150,243,0.06); border-radius:8px; }
        .ws-h-zoom-link:hover { background:rgba(33,150,243,0.12); }
        .ws-h-zoom-note { font-size:11px; color:var(--text-light); margin-top:8px; font-weight:500; }

        /* Filter & sort bar */
        .ws-filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .filter-chip { display:inline-flex; align-items:center; height:32px; padding:0 14px; border-radius:16px; font-size:13px; font-weight:600; border:1.5px solid var(--bg-off); background:var(--white); color:var(--text-light); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .filter-chip:hover { border-color:var(--accent); color:var(--text); }
        .filter-chip.active { background:var(--accent); color:var(--white); border-color:var(--accent); }
        .sort-select { height:32px; padding:0 10px; border-radius:10px; border:1.5px solid var(--bg-off); font-family:'Noto Sans TC',sans-serif; font-size:13px; font-weight:600; color:var(--text); background:var(--white); cursor:pointer; margin-left:auto; }
        .sort-select:focus { outline:none; border-color:var(--accent); }
        .ws-count-badge { display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:24px; padding:0 8px; border-radius:12px; background:rgba(217,119,87,0.12); color:var(--accent-text); font-size:12px; font-weight:700; flex-shrink:0; }

        .empty-state { text-align:center; padding:32px 16px; color:var(--text-light); font-weight:500; }

        /* Attendance history */
        .attend-h-item { display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:14px; border:1px solid var(--bg-off); background:var(--white); margin-bottom:10px; transition:box-shadow 0.2s; }
        .attend-h-item:hover { box-shadow:0 2px 12px rgba(0,0,0,0.06); }
        .attend-h-check { width:36px; height:36px; border-radius:10px; background:var(--green-bg); color:var(--green); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; flex-shrink:0; }
        .attend-h-info { flex:1; min-width:0; }
        .attend-h-title { font-weight:700; font-size:14px; color:var(--text); }
        .attend-h-session { font-size:12px; color:var(--accent-text); font-weight:600; }
        .attend-h-date { font-size:12px; color:var(--text-light); font-weight:500; margin-top:2px; }

        /* Toast */
        .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
        .toast { padding:12px 20px; border-radius:12px; font-size:14px; font-weight:600; color:var(--white); box-shadow:0 4px 16px rgba(0,0,0,0.15); animation:toast-in 0.3s ease; max-width:360px; }
        .toast.success { background:var(--green); }
        .toast.error { background:var(--red); }
        @keyframes toast-in { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        /* Logout */
        .logout-btn { margin-top:24px; text-align:center; }

        @media (max-width:520px) {
            .avatar-wrap { flex-direction:column; text-align:center; }
            .collapsible-header { padding:20px 20px; }
            .collapsible-body-inner { padding:0 20px 24px; }
        }
    </style>
</head>
<body>

<header class="p-header">
    <div class="p-header-inner">
        <a href="/ai-beginner-workshop" class="p-logo">AI<span>FLOW</span>TIME</a>
        <a href="/ai-beginner-workshop" class="p-back">← 返回工作坊一覽</a>
    </div>
</header>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>AI<span style="color:var(--accent);">FLOW</span>TIME</h1>
        <p>登入以管理你的個人資料及工作坊報名紀錄</p>
        <button class="google-btn" onclick="handleLogin()">
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            使用 Google 帳號登入
        </button>
    </div>
</div>

<!-- Profile (shown after login) -->
<div id="profilePage" style="display:none;">
    <div class="container">

        <!-- Avatar + Name -->
        <div class="glass-card">
            <div class="avatar-wrap">
                <img id="avatarImg" class="avatar-img" src="" alt="Profile" onclick="document.getElementById('avatarUpload').click()">
                <input type="file" id="avatarUpload" class="avatar-upload" accept="image/*" onchange="uploadAvatar(this)">
                <div class="avatar-info">
                    <h2 id="displayName">—</h2>
                    <p id="displayEmail">—</p>
                    <a class="avatar-change" onclick="document.getElementById('avatarUpload').click()">更換頭像</a>
                </div>
            </div>
        </div>

        <!-- Personal Info Form (collapsible) -->
        <div class="glass-card collapsible-card" id="profileCard">
            <div class="collapsible-header" onclick="toggleSection('profileCard')">
                <div class="collapsible-header-left">
                    <h3 class="section-title">個人資料</h3>
                    <p class="section-desc">填寫以下資料，報名工作坊時系統會自動幫你填寫。</p>
                </div>
                <span class="collapsible-toggle">▼</span>
            </div>
            <div class="collapsible-body">
                <div class="collapsible-body-inner">
                    <form id="profileForm" onsubmit="return saveProfile(event)">
                        <div class="form-grid">
                            <div class="field">
                                <label>姓名 <span class="req">*</span></label>
                                <input type="text" id="pName" placeholder="請輸入你的姓名" required>
                            </div>
                            <div class="field">
                                <label>年齡組別 <span class="req">*</span></label>
                                <select id="pAge" required>
                                    <option value="">請選擇</option>
                                    <option value="18-24">18 - 24 歲</option>
                                    <option value="25-34">25 - 34 歲</option>
                                    <option value="35-44">35 - 44 歲</option>
                                    <option value="45-54">45 - 54 歲</option>
                                    <option value="55+">55 歲或以上</option>
                                    <option value="prefer-not-to-say">不願透露</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="field">
                                <label>WhatsApp 電話號碼 <span class="req">*</span></label>
                                <input type="tel" id="pPhone" placeholder="e.g. 9123 4567" required>
                            </div>
                            <div class="field">
                                <label>職業類型 <span class="req">*</span></label>
                                <select id="pJob" required>
                                    <option value="">請選擇</option>
                                    <option value="office">辦公室 / 文職</option>
                                    <option value="creative">創意 / 設計 / 媒體</option>
                                    <option value="tech">科技 / IT</option>
                                    <option value="education">教育 / 培訓</option>
                                    <option value="sales">銷售 / 市場營銷</option>
                                    <option value="finance">金融 / 會計</option>
                                    <option value="freelance">自由工作者 / 斜槓族</option>
                                    <option value="business">創業者 / 老闆</option>
                                    <option value="student">學生</option>
                                    <option value="other">其他</option>
                                </select>
                            </div>
                        </div>

                        <!-- Optional questions -->
                        <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--bg-off);">

<script>
var db, auth, storage, currentUser = null;

initFirebase(function() { initProfile(); });

function initProfile() {
    db = firebase.firestore();
    auth = firebase.auth();
    storage = firebase.storage();

    auth.onAuthStateChanged(function(user) {
        if (user) {
            currentUser = user;
            showProfile(user);
        } else {
            currentUser = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('profilePage').style.display = 'none';
        }
    });

    // Checkbox visual + "Other" text field toggle
    document.querySelectorAll('.checkbox-group input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', function() {
            this.closest('label').classList.toggle('checked', this.checked);
            if (this.id === 'pReasonOtherCb') {
                var otherInput = document.getElementById('pReasonOtherText');
                otherInput.style.display = this.checked ? '' : 'none';
                if (!this.checked) otherInput.value = '';
            }
        });
    });
}

function toggleSection(id) {
    document.getElementById(id).classList.toggle('open');
}

function handleLogin() {
    var provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt:'select_account' });
    auth.signInWithPopup(provider).catch(function(err) { showToast('登入失敗：' + err.message, 'error'); });
}

function handleLogout() { auth.signOut(); }

function showProfile(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('profilePage').style.display = 'block';
    document.getElementById('displayName').textContent = user.displayName || '使用者';
    document.getElementById('displayEmail').textContent = user.email;
    document.getElementById('avatarImg').src = user.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80"><rect fill="%23E8E4DF" width="80" height="80" rx="40"/><text x="40" y="48" text-anchor="middle" fill="%237A7A7A" font-size="32" font-family="sans-serif">?</text></svg>';

    loadProfileData(user.uid);
    loadWorkshopHistory(user.uid);
}

function loadProfileData(uid) {
    db.collection('users').doc(uid).get().then(function(doc) {
        if (doc.exists) {
            var d = doc.data();
            document.getElementById('pName').value = d.name || '';
            document.getElementById('pAge').value = d.ageGroup || '';
            document.getElementById('pPhone').value = d.phone || '';
            document.getElementById('pJob').value = d.jobType || '';
            document.getElementById('pAiProblem').value = d.aiProblem || '';
            document.getElementById('pExpectation').value = d.expectation || '';
            if (d.profilePicUrl) document.getElementById('avatarImg').src = d.profilePicUrl;
            if (d.name) document.getElementById('displayName').textContent = d.name;
            // Restore checkbox selections
            if (d.reasons && d.reasons.length) {
                d.reasons.forEach(function(reason) {
                    if (reason === '其他' || reason.indexOf('其他：') === 0) {
                        var cb = document.getElementById('pReasonOtherCb');
                        cb.checked = true; cb.closest('label').classList.add('checked');
                        var otherInput = document.getElementById('pReasonOtherText');
                        otherInput.style.display = '';
                        if (reason.indexOf('其他：') === 0) otherInput.value = reason.substring(3);
                    } else {
                        document.querySelectorAll('#pReasons input[type="checkbox"]').forEach(function(cb) {
                            if (cb.value === reason) { cb.checked = true; cb.closest('label').classList.add('checked'); }
                        });
                    }
                });
            }
        }
    });
}

function saveProfile(event) {
    event.preventDefault();
    if (!currentUser) return false;

    var name = document.getElementById('pName').value.trim();
    var age = document.getElementById('pAge').value;
    var phone = document.getElementById('pPhone').value.trim();
    var job = document.getElementById('pJob').value;

    if (!name || !age || !phone || !job) {
        showProfileError('請填寫所有必填欄位。');
        return false;
    }

    var reasons = [];
    document.querySelectorAll('#pReasons input[type="checkbox"]:checked').forEach(function(cb) {
        if (cb.id === 'pReasonOtherCb') {
            var otherText = document.getElementById('pReasonOtherText').value.trim();
            reasons.push(otherText ? '其他：' + otherText : '其他');
        } else {
            reasons.push(cb.value);
        }
    });

    var data = {
        name: name,
        ageGroup: age,
        phone: phone,
        jobType: job,
        reasons: reasons,
        aiProblem: document.getElementById('pAiProblem').value.trim(),
        expectation: document.getElementById('pExpectation').value.trim(),
        email: currentUser.email,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    var btn = document.getElementById('saveProfileBtn');
    btn.disabled = true;
    btn.textContent = '儲存中...';

    db.collection('users').doc(currentUser.uid).set(data, { merge: true }).then(function() {
        showToast('個人資料已儲存');
        btn.disabled = false;
        btn.textContent = '儲存個人資料';
        document.getElementById('displayName').textContent = name;

        // If there's a redirect, go there
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) {
            var wsId = params.get('id');
            var url = '/' + redirect;
            if (wsId) url += '?id=' + wsId;
            window.location.href = url;
        }
    }).catch(function(err) {
        showToast('儲存失敗：' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '儲存個人資料';
    });

    return false;
}

function showProfileError(msg) {
    var el = document.getElementById('profileError');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 4000);
}

// ============================================================
// AVATAR UPLOAD
// ============================================================
function uploadAvatar(input) {
    var file = input.files[0];
    if (!file || !currentUser) return;
    var ext = file.name.split('.').pop();
    var path = 'profile-pictures/' + currentUser.uid + '/avatar.' + ext;
    var ref = storage.ref(path);
    ref.put(file).then(function(snap) {
        return snap.ref.getDownloadURL();
    }).then(function(url) {
        document.getElementById('avatarImg').src = url;
        return db.collection('users').doc(currentUser.uid).set({ profilePicUrl: url }, { merge: true });
    }).then(function() {
        showToast('頭像已更新');
    }).catch(function(err) {
        showToast('上傳失敗：' + err.message, 'error');
    });
}

// ============================================================
// WORKSHOP HISTORY (real-time)
// ============================================================
var _wsRegistrations = [];
var _wsFilter = 'all';
var _wsHistoryUnsub = null;
var _wsDataUnsub = null;
var _workshopDataCache = {}; // cached workshop data keyed by workshopId

function normalizeRegistrationStatus(status) {
    return String(status || 'pending').trim().toLowerCase();
}

function getStatusText(status) {
    switch(normalizeRegistrationStatus(status)) {
        case 'confirmed': return '已確認付款';
        case 'cancelled': return '已取消';
        case 'deleted': return '已刪除';
        case 'completed': return '已完成';
        default: return '待確認';
    }
}

// Parse date string like "2026年3月15日（星期日）" into a Date object
function parseWorkshopDate(str) {
    if (!str) return null;
    var m = str.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (!m) return null;
    return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}

// Check if a workshop date+time is in the future
function isUpcoming(dateStr, timeStr) {
    var d = parseWorkshopDate(dateStr);
    if (!d) return false; // no date = not upcoming
    var now = new Date();
    // If time is provided, use it
    if (timeStr) {
        var parts = timeStr.split(':');
        if (parts.length === 2) {
            d.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
        }
    } else {
        d.setHours(23, 59, 59, 999); // end of day if no time
    }
    return d > now;
}

function profileSessionStableId(session, fallbackIdx) {
    if (session && session.id && session.id.indexOf('session_') === 0 && !/^session_\d+$/.test(session.id)) return session.id;
    var d = (session && session.date || '').replace(/[年月]/g, '-').replace(/日.*/, '').replace(/\s/g, '');
    var t = (session && session.time || '').replace(/[^0-9:]/g, '');
    if (d || t) return 'session_' + d + (t ? '_' + t : '');
    return 'session_' + (fallbackIdx !== undefined ? fallbackIdx : 0);
}

function _profileResolveSessionMode(wsData, reg) {
    wsData = wsData || {};
    var sessions = wsData.sessions || [];
    if (reg && reg.selectedRound && sessions.length > 1) {
        for (var i = 0; i < sessions.length; i++) {
            var sid = sessions[i].id || profileSessionStableId(sessions[i], i);
            if (sid === reg.selectedRound) return sessions[i].mode || wsData.mode || 'offline';
        }
    }
    if (reg && wsData.courseType === 'continuous' && wsData.rounds && wsData.rounds.length && reg.selectedRound) {
        for (var ri = 0; ri < wsData.rounds.length; ri++) {
            if (wsData.rounds[ri].id === reg.selectedRound) {
                var rSess = wsData.rounds[ri].sessions || [];
                if (rSess.length) return rSess[0].mode || wsData.mode || 'offline';
            }
        }
    }
    if (sessions.length === 1 && sessions[0].mode) return sessions[0].mode;
    return wsData.mode || 'offline';
}

function _profileResolveZoomLink(wsData, reg) {
    wsData = wsData || {};
    var sessions = wsData.sessions || [];
    if (reg && reg.selectedRound && sessions.length > 1) {
        for (var i = 0; i < sessions.length; i++) {
            var sid = sessions[i].id || profileSessionStableId(sessions[i], i);
            if (sid === reg.selectedRound) return sessions[i].zoomLink || wsData.zoomLink || '';
        }
    }
    if (reg && wsData.courseType === 'continuous' && wsData.rounds && wsData.rounds.length && reg.selectedRound) {
        for (var ri = 0; ri < wsData.rounds.length; ri++) {
            if (wsData.rounds[ri].id === reg.selectedRound) {
                var rSess = wsData.rounds[ri].sessions || [];
                for (var si = 0; si < rSess.length; si++) {
                    if (rSess[si].zoomLink) return rSess[si].zoomLink;
                }
            }
        }
    }
    if (sessions.length === 1 && sessions[0].zoomLink) return sessions[0].zoomLink;
    return wsData.zoomLink || '';
}

function _profileResolveLocation(wsData, reg) {
    wsData = wsData || {};
    var sessions = wsData.sessions || [];
    if (reg && reg.selectedRound && sessions.length > 1) {
        for (var i = 0; i < sessions.length; i++) {
            var sid = sessions[i].id || profileSessionStableId(sessions[i], i);
            if (sid === reg.selectedRound) return sessions[i].location || wsData.location || '';
        }
    }
    if (reg && wsData.courseType === 'continuous' && wsData.rounds && wsData.rounds.length && reg.selectedRound) {
        for (var ri = 0; ri < wsData.rounds.length; ri++) {
            if (wsData.rounds[ri].id === reg.selectedRound) {
                var rSess = wsData.rounds[ri].sessions || [];
                if (rSess.length) return rSess[0].location || wsData.location || '';
            }
        }
    }
    if (sessions.length === 1 && sessions[0].location) return sessions[0].location;
    return wsData.location || '';
}

function _rebuildProfileWorkshops() {
    if (!_wsRegistrations.length && !Object.keys(_workshopDataCache).length) return;
    // Re-enrich registrations with latest workshop data
    _wsRegistrations.forEach(function(r) {
        var wsData = _workshopDataCache[r.workshopId];
        if (wsData) {
            r._wsDate = r.workshopDate || wsData.date || '';
            r._wsTime = r.workshopTime || wsData.time || '';
            r._wsDesc = wsData.description || r.workshopDescription || '';
            r._wsTitle = wsData.title || r.workshopTitle || '';
        }
    });
    // Update count badge
    var badge = document.getElementById('wsCountBadge');
    if (_wsRegistrations.length > 0) {
        badge.style.display = '';
        badge.textContent = _wsRegistrations.length + ' 個報名';
    } else {
        badge.style.display = 'none';
    }
    document.getElementById('wsFilterBar').style.display = _wsRegistrations.length > 0 ? 'flex' : 'none';
    applyWsFilterSort();
    renderAttendanceHistory();
}

function loadWorkshopHistory(uid) {
    // Clean up previous listeners
    if (_wsHistoryUnsub) _wsHistoryUnsub();
    if (_wsDataUnsub) _wsDataUnsub();

    // Real-time listener on workshops (for date/time/description updates)
    _wsDataUnsub = db.collection('workshops').onSnapshot(function(wsSnap) {
        _workshopDataCache = {};
        wsSnap.forEach(function(doc) {
            _workshopDataCache[doc.id] = doc.data();
        });
        _rebuildProfileWorkshops();
    });

    // Real-time listener on registrations
    _wsHistoryUnsub = db.collection('registrations')
        .where('userId', '==', uid)
        .orderBy('createdAt', 'desc')
        .onSnapshot(function(snap) {
            _wsRegistrations = [];
            snap.forEach(function(doc) {
                var r = doc.data();
                if (normalizeRegistrationStatus(r.status) === 'deleted') return;
                r._id = doc.id;
                r._wsDate = r.workshopDate || '';
                r._wsTime = r.workshopTime || '';
                r._wsDesc = r.workshopDescription || '';
                r._wsTitle = r.workshopTitle || '';
                _wsRegistrations.push(r);
            });
            _rebuildProfileWorkshops();
        }, function(err) {
            document.getElementById('wsHistory').innerHTML = '<div class="empty-state" style="color:var(--red);">載入失敗：' + err.message + '</div>';
        });
}

// SVG icon helpers
var _svgCalendar = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
var _svgClock = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

function buildWsHistoryItemHtml(r) {
    var status = normalizeRegistrationStatus(r.status);
    var hasScreenshot = r.paymentScreenshotUrl && r.paymentScreenshotUrl.length > 0;
    var isAwaitingPayment = status === 'pending' && !hasScreenshot;
    var statusClass = isAwaitingPayment ? 'awaiting_payment' : status;
    var statusText = isAwaitingPayment ? '待付款' : getStatusText(status);
    var upcoming = isUpcoming(r._wsDate, r._wsTime) && status !== 'cancelled' && status !== 'deleted';

    var metaHtml = '';
    if (r.selectedRoundLabel) {
        metaHtml += '<span class="ws-h-meta-icon">' + _svgCalendar + ' ' + escHtml(r.selectedRoundLabel) + '</span>';
    } else {
        if (r._wsDate) metaHtml += '<span class="ws-h-meta-icon">' + _svgCalendar + ' ' + escHtml(r._wsDate) + '</span>';
        if (r._wsTime) metaHtml += '<span class="ws-h-meta-icon">' + _svgClock + ' ' + escHtml(r._wsTime) + '</span>';
    }
    if (r.pricePaid) {
        metaHtml += '<span>' + escHtml(r.pricePaid) + '</span>';
    }

    var descHtml = '';
    if (r._wsDesc) {
        descHtml = '<div class="ws-h-desc">' + escHtml(r._wsDesc) + '</div>';
    }

    // Upcoming badge
    var upcomingHtml = upcoming ? '<span class="ws-upcoming-badge">📅 即將來臨</span>' : '';

    // Screenshot thumbnail for 待確認 (pending + has screenshot)
    var screenshotHtml = '';
    if (status === 'pending' && hasScreenshot) {
        screenshotHtml = '<div class="ws-h-screenshot-wrap">' +
            '<img class="ws-h-screenshot-thumb" src="' + escHtml(fixStorageUrl(r.paymentScreenshotUrl)) + '" alt="付款截圖">' +
            '<span class="ws-h-screenshot-label">已上傳付款截圖</span>' +
        '</div>';
    }

    // CTA for awaiting payment
    var ctaHtml = isAwaitingPayment ? '<div class="ws-h-cta">請即完成報名 →</div>' : '';

    // Workshop mode & Zoom link
    var wsData = _workshopDataCache[r.workshopId] || {};
    var wsMode = _profileResolveSessionMode(wsData, r);
    var wsZoomLink = _profileResolveZoomLink(wsData, r);

    // QR code for confirmed upcoming workshops (offline / both)
    var qrHtml = '';
    if (status === 'confirmed' && r.attendanceToken && upcoming && wsMode !== 'online') {
        var qrId = 'qr-' + (r._id || '').replace(/[^a-zA-Z0-9]/g, '');
        qrHtml = '<div class="ws-h-qr-wrap">' +
            '<div class="ws-h-qr-label">🎟️ 簽到 QR Code</div>' +
            '<div class="ws-h-qr-canvas" id="' + qrId + '"></div>' +
            '<div class="ws-h-qr-note">請於工作坊當日出示此 QR Code 進行簽到</div>' +
        '</div>';
        setTimeout(function() { generateQrCode(qrId, r.attendanceToken); }, 100);
    } else if (status === 'confirmed' && r.attendedAt) {
        qrHtml = '<div class="ws-h-qr-wrap" style="border-color:rgba(46,125,50,0.3);background:rgba(46,125,50,0.08);">' +
            '<div class="ws-h-qr-label">✅ 已簽到</div>' +
        '</div>';
    }

    // Zoom link for online / both workshops
    var zoomHtml = '';
    if (status === 'confirmed' && upcoming && wsZoomLink && (wsMode === 'online' || wsMode === 'both')) {
        zoomHtml = '<div class="ws-h-zoom-wrap">' +

function setWsFilter(filter) {

function applyWsFilterSort() {
    var container = document.getElementById('wsHistory');
    var sortOrder = document.getElementById('wsSort').value;

    // Deduplicate: keep only the most relevant registration per workshop
    // Priority: confirmed > pending-with-screenshot > pending-no-screenshot > cancelled
    function regPriority(r) {
        var s = normalizeRegistrationStatus(r.status);
        if (s === 'confirmed') return 4;
        if (s === 'pending' && r.paymentScreenshotUrl) return 3;
        if (s === 'pending') return 2;
        if (s === 'cancelled') return 1;
        return 0;
    }
    var bestByWs = {};
    _wsRegistrations.forEach(function(r) {
        var wsId = r.workshopId || r._id;
        var existing = bestByWs[wsId];
        if (!existing || regPriority(r) > regPriority(existing)) {
            bestByWs[wsId] = r;
        } else if (regPriority(r) === regPriority(existing)) {
            // Same priority: keep the most recent one
            var tR = r.createdAt ? (r.createdAt.toMillis ? r.createdAt.toMillis() : 0) : 0;
            var tE = existing.createdAt ? (existing.createdAt.toMillis ? existing.createdAt.toMillis() : 0) : 0;
            if (tR > tE) bestByWs[wsId] = r;
        }
    });
    var deduped = Object.keys(bestByWs).map(function(k) { return bestByWs[k]; });

    // Filter
    var filtered = deduped.filter(function(r) {
        if (_wsFilter === 'all') return true;
        var status = normalizeRegistrationStatus(r.status);
        var hasScreenshot = r.paymentScreenshotUrl && r.paymentScreenshotUrl.length > 0;
        if (_wsFilter === 'awaiting_payment') return status === 'pending' && !hasScreenshot;
        if (_wsFilter === 'pending') return status === 'pending' && hasScreenshot;
        return status === _wsFilter;
    });

    // Sort: upcoming first (by date ascending), then rest by createdAt
    filtered.sort(function(a, b) {
        var aStatus = normalizeRegistrationStatus(a.status);
        var bStatus = normalizeRegistrationStatus(b.status);
        var aUpcoming = isUpcoming(a._wsDate, a._wsTime) && aStatus !== 'cancelled' && aStatus !== 'deleted';
        var bUpcoming = isUpcoming(b._wsDate, b._wsTime) && bStatus !== 'cancelled' && bStatus !== 'deleted';

        // Upcoming workshops first
        if (aUpcoming && !bUpcoming) return -1;
        if (!aUpcoming && bUpcoming) return 1;

        // Within upcoming: sort by date ascending (soonest first)
        if (aUpcoming && bUpcoming) {
            var dA = parseWorkshopDate(a._wsDate);
            var dB = parseWorkshopDate(b._wsDate);
            if (dA && dB) return dA.getTime() - dB.getTime();
            if (!dA) return 1;
            if (!dB) return -1;
        }

        // For non-upcoming: sort by createdAt
        var tA = a.createdAt ? (a.createdAt.toMillis ? a.createdAt.toMillis() : 0) : 0;
        var tB = b.createdAt ? (b.createdAt.toMillis ? b.createdAt.toMillis() : 0) : 0;
        return sortOrder === 'newest' ? tB - tA : tA - tB;
    });

    if (filtered.length === 0 && _wsRegistrations.length === 0) {
        container.innerHTML = '<div class="empty-state">你尚未報名任何工作坊。<br><a href="/ai-beginner-workshop" style="color:var(--accent);font-weight:700;">瀏覽工作坊</a></div>';
        return;
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">沒有符合篩選條件的工作坊。</div>';
        return;
    }

    var html = '';
    filtered.forEach(function(r) {
        html += buildWsHistoryItemHtml(r);
    });
    container.innerHTML = html;

    // Auto-expand if there are upcoming workshops
    var hasUpcoming = _wsRegistrations.some(function(r) {
        var s = normalizeRegistrationStatus(r.status);
        return isUpcoming(r._wsDate, r._wsTime) && s !== 'cancelled' && s !== 'deleted';
    });
    if (hasUpcoming) {
        document.getElementById('wsCard').classList.add('open');
    }
}

function renderAttendanceHistory() {
    var card = document.getElementById('attendCard');
    var container = document.getElementById('attendHistory');
    var badge = document.getElementById('attendCountBadge');
    if (!container) return;

    var records = [];
    _wsRegistrations.forEach(function(r) {
        if (normalizeRegistrationStatus(r.status) !== 'confirmed') return;
        var wsData = _workshopDataCache[r.workshopId] || {};
        var wsName = (wsData.workshopNumber ? wsData.workshopNumber + ' — ' : '') + (r._wsTitle || r.workshopId || '');

        if (r.attendance && typeof r.attendance === 'object') {
            Object.keys(r.attendance).forEach(function(key) {
                var sess = r.attendance[key];
                if (sess && sess.attendedAt) {
                    records.push({ wsName: wsName, label: sess.label || key, time: sess.attendedAt });
                }
            });
        } else if (r.attendedAt) {
            records.push({ wsName: wsName, label: '', time: r.attendedAt });
        }
    });

    if (records.length === 0) {
        card.style.display = 'none';
        return;
    }

    card.style.display = '';
    badge.style.display = '';
    badge.textContent = records.length + ' 次';

    records.sort(function(a, b) {
        var tA = a.time.toDate ? a.time.toDate().getTime() : new Date(a.time).getTime();
        var tB = b.time.toDate ? b.time.toDate().getTime() : new Date(b.time).getTime();
        return tB - tA;
    });

    var html = '';
    records.forEach(function(a) {
        var tDate = a.time.toDate ? a.time.toDate() : new Date(a.time);
        var dateStr = tDate.toLocaleDateString('zh-Hant', { year: 'numeric', month: 'long', day: 'numeric' });
        var timeStr = tDate.toLocaleTimeString('zh-Hant', { hour: '2-digit', minute: '2-digit' });
        html += '<div class="attend-h-item">' +
            '<div class="attend-h-check">✓</div>' +
            '<div class="attend-h-info">' +
                '<div class="attend-h-title">' + escHtml(a.wsName) + '</div>' +
                (a.label ? '<div class="attend-h-session">' + escHtml(a.label) + '</div>' : '') +
                '<div class="attend-h-date">' + dateStr + ' ' + timeStr + '</div>' +
            '</div>' +
        '</div>';
    });
    container.innerHTML = html;
}

function _safeText(str) {
    if (!str) return '';
    return String(str).replace(/[^\x00-\x7F]/g, function(ch) {
        // Keep common punctuation-like CJK but replace the rest
        return '';
    }).replace(/\s+/g, ' ').trim();
}

function _parseDateToEnglish(dateStr) {
    if (!dateStr) return '';
    // Try to extract numbers from Chinese date like "2026年3月16日 (星期日)"
    var m = String(dateStr).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (m) {
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return m[3] + ' ' + months[parseInt(m[2]) - 1] + ' ' + m[1];
    }
    // Fallback: strip non-ASCII
    return _safeText(dateStr);
}

function _loadImageAsDataUrl(src) {
    return new Promise(function(resolve) {
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            var c = document.createElement('canvas');
            c.width = img.naturalWidth;
            c.height = img.naturalHeight;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/png'));
        };
        img.onerror = function() { resolve(null); };
        img.src = src;
    });
}

function _generateQrDataUrl(text, size) {
    return new Promise(function(resolve) {
        if (typeof QRCode === 'undefined' || !text) { resolve(null); return; }
        var wrap = document.createElement('div');
        wrap.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
        document.body.appendChild(wrap);
        new QRCode(wrap, { text: text, width: size || 200, height: size || 200, colorDark: '#3B3B3B', colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.M });
        setTimeout(function() {
            var canvas = wrap.querySelector('canvas');
            var dataUrl = canvas ? canvas.toDataURL('image/png') : null;
            document.body.removeChild(wrap);
            resolve(dataUrl);
        }, 150);
    });
}

// Lock pinch/double-tap zoom on mobile browsers
(function lockPageZoom() {
    var lastTouchEnd = 0;
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', function(e) {
        if (e.touches && e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
