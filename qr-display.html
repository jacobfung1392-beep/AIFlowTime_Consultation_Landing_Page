<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR 顯示頁 | AIFLOWTIME</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FAF9F7;
            --bg-off: #E8E4DF;
            --accent: #D97757;
            --accent-dark: #C56A4B;
            --text: #3B3B3B;
            --text-light: #7A7A7A;
            --white: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-cream);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
            font-weight: 400;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }
        .header-inner {
            max-width: 900px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
        }
        .logo { font-size: 18px; font-weight: 700; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .user-email { font-size: 13px; color: var(--text-light); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            height: 44px; padding: 0 20px; border-radius: 12px;
            font-family: inherit; font-size: 14px; font-weight: 700;
            border: none; cursor: pointer; transition: all 0.2s;
            background: var(--accent); color: var(--white);
        }
        .btn:hover { background: var(--accent-dark); }
        .btn-outline {
            background: transparent; color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-outline:hover { background: rgba(217, 119, 87, 0.08); }

        .login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: var(--bg-cream);
        }
        .login-card {
            background: var(--white); border-radius: 20px; padding: 48px;
            text-align: center; box-shadow: 0 8px 40px var(--shadow);
            max-width: 400px; width: 100%;
        }
        .login-card h1 { font-size: 24px; margin-bottom: 8px; }
        .login-card h1 span { color: var(--accent); }
        .login-card p { color: var(--text-light); margin-bottom: 24px; font-size: 14px; }
        .login-error { color: #C62828; font-size: 13px; margin-top: 12px; display: none; }
        .google-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 12px 24px; border: 1px solid var(--bg-off); border-radius: 12px;
            background: var(--white); font-family: inherit; font-size: 15px; font-weight: 600;
            color: var(--text); cursor: pointer; transition: all 0.2s;
        }
        .google-btn:hover { border-color: var(--accent); background: rgba(217,119,87,0.04); }

        .dashboard { display: none; padding-bottom: 48px; }
        .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
        .qr-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            align-items: start;
            margin-bottom: 40px;
        }
        @media (max-width: 768px) {
            .qr-hero { grid-template-columns: 1fr; }
        }
        .qr-section { text-align: center; }
        .qr-section h2 {
            font-size: clamp(22px, 3vw, 28px);
            margin-bottom: 20px;
            color: var(--text);
        }
        .qr-wrap {
            display: inline-block;
            padding: 24px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow);
            border: 1px solid var(--glass-border);
        }
        .qr-wrap img { display: block; width: 280px; height: 280px; }
        .qr-caption { margin-top: 16px; font-size: 14px; color: var(--text-light); }
        .box-titles-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px var(--shadow);
        }
        .box-titles-panel h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .box-titles-panel .hint { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }
        .box-titles-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
        .box-title-row { display: flex; gap: 10px; align-items: center; }
        .box-title-row input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--bg-off);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--white);
        }
        .box-title-row input:focus { outline: none; border-color: var(--accent); }
        .box-title-row .btn-remove-title {
            flex-shrink: 0;
            width: 40px; height: 44px;
            border: 2px solid var(--bg-off);
            border-radius: 12px;
            background: var(--white);
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .box-title-row .btn-remove-title:hover {
            border-color: #C62828;
            color: #C62828;
            background: rgba(198, 40, 40, 0.06);
        }
        .btn-add-title {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border: 2px dashed var(--bg-off);
            border-radius: 12px;
            background: transparent;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add-title:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(217, 119, 87, 0.06);
        }
        .btn-save-titles { margin-top: 16px; width: 100%; height: 44px; }
        .save-status { font-size: 12px; color: var(--text-light); margin-top: 8px; }
        .save-status.saved { color: #2E7D32; }
        .submissions-section h2 {
            font-size: clamp(20px, 2.5vw, 24px);
            margin-bottom: 20px;
            color: var(--text);
        }
        .submissions-list { display: flex; flex-direction: column; gap: 20px; }
        .submission-card {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 4px 24px var(--shadow);
        }
        .submission-card .card-body { flex: 1; min-width: 0; }
        .submission-card .time {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        .submission-card .block-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 2px;
            margin-top: 10px;
        }
        .submission-card .block-label:first-of-type { margin-top: 0; }
        .submission-card .block {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            font-size: 15px;
            line-height: 1.6;
        }
        .submission-card .block:last-child { border-bottom: none; }
        .submission-card .btn-delete {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border: 2px solid var(--bg-off);
            border-radius: 12px;
            background: var(--white);
            color: var(--text-light);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submission-card .btn-delete:hover {
            border-color: #C62828;
            color: #C62828;
            background: rgba(198, 40, 40, 0.06);
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-light);
            font-size: 15px;
        }
        /* Confirm modal – consistent with workshop UI */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .confirm-overlay.show {
            display: flex;
        }
        .confirm-modal {
            background: var(--white);
            border-radius: 20px;
            padding: 28px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
            border: 1px solid var(--glass-border);
        }
        .confirm-modal h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }
        .confirm-modal p {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .confirm-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .confirm-actions .btn-cancel {
            background: transparent;
            color: var(--text-light);
            border: 2px solid var(--bg-off);
        }
        .confirm-actions .btn-cancel:hover {
            border-color: var(--text-light);
            color: var(--text);
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>QR <span>顯示頁</span></h1>
            <p>請使用授權的 Google 帳號登入</p>
            <p id="loginError" class="login-error"></p>
            <button type="button" class="google-btn" id="googleLoginBtn">以 Google 帳號登入</button>
        </div>
    </div>
    <div id="dashboard" class="dashboard">
        <header class="header">
            <div class="header-inner">
                <a href="linktree.html" class="logo">AIFlowTime <span>QR</span></a>
                <div class="header-actions">
                    <span class="user-email" id="userEmail"></span>
                    <button type="button" class="btn btn-outline" id="logoutBtn">登出</button>
                </div>
            </div>
        </header>
        <main class="container">
            <section class="qr-hero">
                <div class="qr-section">
                    <h2>掃描下方 QR Code 提交內容</h2>
                    <div class="qr-wrap">
                        <img id="qrImage" src="" alt="QR Code" width="280" height="280">
                    </div>
                    <p class="qr-caption">每人掃描後會看到自己的表單，填寫後提交即顯示於下方。</p>
                </div>
                <div class="box-titles-panel">
                    <h3>區塊標題設定</h3>
                    <p class="hint">設定後，掃描者會看到這些標題對應的輸入框。留空則使用預設「輸入內容…」。</p>
                    <div id="boxTitlesList" class="box-titles-list"></div>
                    <button type="button" class="btn-add-title" id="addTitleBtn">＋ 新增標題</button>
                    <button type="button" class="btn btn-save-titles" id="saveTitlesBtn">儲存標題</button>
                    <p id="saveStatus" class="save-status"></p>
                </div>
            </section>
            <section class="submissions-section">
                <h2>提交結果</h2>
                <div id="submissionsList" class="submissions-list"></div>
                <div id="emptyState" class="empty-state" style="display:none;">尚未有提交內容</div>
            </section>
        </main>
    </div>

    <!-- Confirm modal (workshop-style UI) -->
    <div id="confirmOverlay" class="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="confirm-modal">
            <h3 id="confirmTitle">確認</h3>
            <p id="confirmMessage"></p>
            <div class="confirm-actions">
                <button type="button" class="btn btn-cancel" id="confirmCancelBtn">取消</button>
                <button type="button" class="btn" id="confirmOkBtn">確定</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-init.js"></script>
    <script>
        var auth, db;
        var ALLOWED_EMAIL = 'jacobfung1392@gmail.com';
        var unsubSnapshot = null;

        initFirebase(function(app) {
            auth = app.auth();
            db = app.firestore();
            document.getElementById('googleLoginBtn').onclick = handleGoogleLogin;
            document.getElementById('logoutBtn').onclick = function() {
                showConfirm('確定要登出嗎？', '登出後需重新以 Google 帳號登入。', '取消', '登出', function() {
                    auth.signOut();
                });
            };
            auth.onAuthStateChanged(onAuthChange);
        });

        function handleGoogleLogin() {
            var provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithPopup(provider).catch(function(err) {
                showLoginError('登入失敗：' + (err.message || '請重試'));
            });
        }

        function showLoginError(msg) {
            var el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function onAuthChange(user) {
            document.getElementById('loginError').style.display = 'none';
            if (!user) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
                if (unsubSnapshot) {
                    unsubSnapshot();
                    unsubSnapshot = null;
                }
                return;
            }
            if (user.email !== ALLOWED_EMAIL) {
                auth.signOut();
                showLoginError('此帳號無權限存取。僅限 ' + ALLOWED_EMAIL);
                return;
            }
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userEmail').textContent = user.email;
            setQrImage();
            loadBoxTitles();
            subscribeSubmissions();
        }

        var QR_SETTINGS_DOC = 'display';
        function loadBoxTitles() {
            db.collection('qrSettings').doc(QR_SETTINGS_DOC).get().then(function(doc) {
                var titles = (doc.exists && doc.data().boxTitles) ? doc.data().boxTitles : [];
                if (!Array.isArray(titles)) titles = [];
                renderBoxTitlesList(titles);
            }).catch(function() { renderBoxTitlesList([]); });
        }
        function renderBoxTitlesList(titles) {
            var listEl = document.getElementById('boxTitlesList');
            listEl.innerHTML = '';
            titles.forEach(function(t, i) {
                var row = document.createElement('div');
                row.className = 'box-title-row';
                row.innerHTML = '<input type="text" class="title-input" placeholder="例如：姓名、意見、問題" value="' + escapeAttrForInput(t || '') + '" maxlength="80">' +
                    '<button type="button" class="btn-remove-title" aria-label="移除標題">×</button>';
                row.querySelector('.btn-remove-title').onclick = function() {
                    showConfirm('移除此標題', '確定要移除此區塊標題嗎？掃描者表單將不再顯示此欄位。', '取消', '移除', function() {
                        var inputs = listEl.querySelectorAll('.title-input');
                        var next = [];
                        inputs.forEach(function(inp, j) { if (j !== i) next.push(inp.value.trim()); });
                        renderBoxTitlesList(next);
                    });
                };
                listEl.appendChild(row);
            });
            document.getElementById('addTitleBtn').onclick = function() {
                var inputs = listEl.querySelectorAll('.title-input');
                var next = [];
                inputs.forEach(function(inp) { next.push(inp.value.trim()); });
                next.push('');
                renderBoxTitlesList(next);
                if (listEl.lastChild && listEl.lastChild.querySelector) listEl.lastChild.querySelector('.title-input').focus();
            };
            document.getElementById('saveTitlesBtn').onclick = saveBoxTitles;
        }
        function saveBoxTitles() {
            var inputs = document.querySelectorAll('#boxTitlesList .title-input');
            var boxTitles = [];
            inputs.forEach(function(inp) { boxTitles.push((inp.value || '').trim() || ''); });
            document.getElementById('saveStatus').textContent = '儲存中…';
            document.getElementById('saveStatus').classList.remove('saved');
            db.collection('qrSettings').doc(QR_SETTINGS_DOC).set({ boxTitles: boxTitles }).then(function() {
                document.getElementById('saveStatus').textContent = '已儲存';
                document.getElementById('saveStatus').classList.add('saved');
            }).catch(function() {
                document.getElementById('saveStatus').textContent = '儲存失敗';
                document.getElementById('saveStatus').classList.remove('saved');
            });
        }
        function escapeAttrForInput(s) {
            var div = document.createElement('div');
            div.textContent = s == null ? '' : s;
            return div.innerHTML.replace(/"/g, '&quot;');
        }

        function setQrImage() {
            var base = window.location.origin || (window.location.protocol + '//' + window.location.host);
            var submitUrl = base + '/qr-submit.html';
            document.getElementById('qrImage').src =
                'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(submitUrl);
        }

        function subscribeSubmissions() {
            if (unsubSnapshot) unsubSnapshot();
            unsubSnapshot = db.collection('qrSubmissions')
                .orderBy('createdAt', 'desc')
                .onSnapshot(function(snap) {
                    var listEl = document.getElementById('submissionsList');
                    var emptyEl = document.getElementById('emptyState');
                    listEl.innerHTML = '';
                    if (!snap || snap.empty) {
                        emptyEl.style.display = 'block';
                        return;
                    }
                    emptyEl.style.display = 'none';
                    snap.docs.forEach(function(doc) {
                        var d = doc.data();
                        var card = document.createElement('div');
                        card.className = 'submission-card';
                        var createdAt = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate() : new Date();
                        var timeStr = createdAt.toLocaleString('zh-Hant', {
                            dateStyle: 'short',
                            timeStyle: 'medium'
                        });
                        var blocks = Array.isArray(d.blocks) ? d.blocks : (d.text ? [d.text] : []);
                        var boxTitles = Array.isArray(d.boxTitles) ? d.boxTitles : [];
                        var bodyHtml = '<div class="time">' + timeStr + '</div>';
                        blocks.forEach(function(block, i) {
                            var t = typeof block === 'string' ? block : (block && block.text) || '';
                            var title = (boxTitles[i] && String(boxTitles[i]).trim()) ? String(boxTitles[i]).trim() : '';
                            if (title) bodyHtml += '<div class="block-label">' + escapeHtml(title) + '</div>';
                            if (t) bodyHtml += '<div class="block">' + escapeHtml(t) + '</div>';
                        });
                        if (blocks.length === 0) bodyHtml += '<div class="block">（無內容）</div>';
                        var subId = doc.id;
                        card.innerHTML = '<div class="card-body">' + bodyHtml + '</div>' +
                            '<button type="button" class="btn-delete" aria-label="刪除此筆">刪除</button>';
                        card.querySelector('.btn-delete').onclick = function() {
                            showConfirm('刪除此筆提交', '確定要刪除這筆提交嗎？刪除後無法復原。', '取消', '刪除', function() {
                                db.collection('qrSubmissions').doc(subId).delete().catch(function(err) {
                                    console.error('Delete failed', err);
                                });
                            });
                        };
                        listEl.appendChild(card);
                    });
                }, function(err) {
                    console.error('qrSubmissions listener error', err);
                    document.getElementById('emptyState').textContent = '無法載入提交記錄';
                    document.getElementById('emptyState').style.display = 'block';
                });
        }

        function escapeHtml(s) {
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function showConfirm(title, message, cancelLabel, okLabel, onConfirm, onCancel) {
            var overlay = document.getElementById('confirmOverlay');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message || '';
            document.getElementById('confirmCancelBtn').textContent = cancelLabel || '取消';
            document.getElementById('confirmOkBtn').textContent = okLabel || '確定';
            overlay.classList.add('show');
            function close() {
                overlay.classList.remove('show');
                document.getElementById('confirmOkBtn').onclick = null;
                document.getElementById('confirmCancelBtn').onclick = null;
                overlay.onclick = null;
            }
            document.getElementById('confirmOkBtn').onclick = function() {
                close();
                if (typeof onConfirm === 'function') onConfirm();
            };
            document.getElementById('confirmCancelBtn').onclick = function() {
                close();
                if (typeof onCancel === 'function') onCancel();
            };
            overlay.onclick = function(e) {
                if (e.target === overlay) {
                    close();
                    if (typeof onCancel === 'function') onCancel();
                }
            };
        }
    </script>
</body>
</html>
